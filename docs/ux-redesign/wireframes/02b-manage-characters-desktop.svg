  <rect x="12" y="14" width="40" height="40" rx="10" fill="#818cf8" opacity="0.4"/>
  <text x="32" y="40" font-size="20" fill="#fff" font-weight="700" text-anchor="middle" opacity="0.4">A</text>

  <!-- Dimmed header -->
