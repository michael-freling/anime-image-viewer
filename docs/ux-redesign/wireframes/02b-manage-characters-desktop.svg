  <text x="84" y="46" font-size="20" fill="#f1f5f9" font-weight="700" opacity="0.3">Attack on Titan</text>

  <!-- Dimmed image grid -->
  <g opacity="0.15">
    <rect x="84" y="120" width="260" height="174" rx="8" fill="#312e81"/>
    <rect x="354" y="120" width="260" height="210" rx="8" fill="#831843"/>
    <rect x="624" y="120" width="260" height="160" rx="8" fill="#14532d"/>
