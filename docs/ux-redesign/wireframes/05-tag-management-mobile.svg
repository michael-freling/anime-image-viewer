<svg viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
      .body { font-size: 12px; fill: #94a3b8; }
      .small { font-size: 10px; fill: #64748b; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#0f0f14"/>

  <!-- Status bar -->
  <text x="20" y="30" font-size="12" fill="#f1f5f9" font-weight="600">9:41</text>

  <!-- Header -->
  <text x="20" y="72" font-size="24" fill="#f1f5f9" font-weight="700">Tags</text>
  <text x="20" y="94" class="body">47 tags -- 5 categories</text>
  <rect x="280" y="52" width="80" height="36" rx="8" fill="#818cf8"/>
  <text x="320" y="76" font-size="12" fill="#fff" text-anchor="middle">+ New</text>

  <!-- Search -->
  <rect x="20" y="110" width="335" height="40" rx="20" fill="#1e1e2e" stroke="#2d2d3f"/>
  <text x="48" y="135" font-size="12" fill="#475569">Search tags...</text>

  <!-- Category: Characters -->
  <text x="20" y="180" font-size="16" fill="#f1f5f9" font-weight="600">Characters</text>
  <text x="148" y="180" font-size="12" fill="#64748b">18 tags</text>

  <!-- Tag cards (compact, full width) -->
  <g transform="translate(20, 194)">
    <rect width="335" height="80" rx="12" fill="#1e1e2e"/>
    <rect width="80" height="80" rx="12" fill="#312e81"/>
    <text x="40" y="44" font-size="10" fill="#818cf8" text-anchor="middle">4 imgs</text>
    <text x="96" y="36" font-size="14" fill="#f1f5f9" font-weight="500">Eren</text>
    <text x="96" y="56" font-size="11" fill="#64748b">86 images -- 3 anime</text>
    <text x="310" y="44" font-size="14" fill="#475569" text-anchor="end">&gt;</text>
  </g>

  <g transform="translate(20, 282)">
    <rect width="335" height="80" rx="12" fill="#1e1e2e"/>
    <rect width="80" height="80" rx="12" fill="#831843"/>
    <text x="40" y="44" font-size="10" fill="#f9a8d4" text-anchor="middle">4 imgs</text>
    <text x="96" y="36" font-size="14" fill="#f1f5f9" font-weight="500">Mikasa</text>
    <text x="96" y="56" font-size="11" fill="#64748b">72 images -- 2 anime</text>
    <text x="310" y="44" font-size="14" fill="#475569" text-anchor="end">&gt;</text>
  </g>

  <g transform="translate(20, 370)">
    <rect width="335" height="80" rx="12" fill="#1e1e2e"/>
    <rect width="80" height="80" rx="12" fill="#14532d"/>
    <text x="40" y="44" font-size="10" fill="#6ee7b7" text-anchor="middle">4 imgs</text>
    <text x="96" y="36" font-size="14" fill="#f1f5f9" font-weight="500">Armin</text>
    <text x="96" y="56" font-size="11" fill="#64748b">54 images -- 1 anime</text>
    <text x="310" y="44" font-size="14" fill="#475569" text-anchor="end">&gt;</text>
  </g>

  <!-- Category: Scenes -->
  <text x="20" y="486" font-size="16" fill="#f1f5f9" font-weight="600">Scenes</text>
  <text x="112" y="486" font-size="12" fill="#64748b">12 tags</text>

  <g transform="translate(20, 500)">
    <rect width="335" height="80" rx="12" fill="#1e1e2e"/>
    <rect width="80" height="80" rx="12" fill="#14532d"/>
    <text x="96" y="36" font-size="14" fill="#f1f5f9" font-weight="500">Outdoor</text>
    <text x="96" y="56" font-size="11" fill="#64748b">124 images -- 8 anime</text>
    <text x="310" y="44" font-size="14" fill="#475569" text-anchor="end">&gt;</text>
  </g>

  <g transform="translate(20, 588)">
    <rect width="335" height="80" rx="12" fill="#1e1e2e"/>
    <rect width="80" height="80" rx="12" fill="#312e81"/>
    <text x="96" y="36" font-size="14" fill="#f1f5f9" font-weight="500">Indoor</text>
    <text x="96" y="56" font-size="11" fill="#64748b">98 images -- 7 anime</text>
    <text x="310" y="44" font-size="14" fill="#475569" text-anchor="end">&gt;</text>
  </g>

  <g transform="translate(20, 676)">
    <rect width="335" height="60" rx="12" fill="#1e1e2e"/>
    <rect width="60" height="60" rx="12" fill="#831843"/>
    <text x="76" y="36" font-size="14" fill="#f1f5f9" font-weight="500">Action</text>
  </g>

  <!-- Bottom Tab Bar -->
  <rect x="0" y="748" width="375" height="64" fill="#16161e" stroke="#2d2d3f" stroke-width="1"/>
  <g transform="translate(30, 756)">
