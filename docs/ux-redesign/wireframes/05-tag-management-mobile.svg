<svg viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
      .label { font-size: 10px; fill: #888; }
      .heading { font-size: 17px; fill: #111; font-weight: 600; }
      .body { font-size: 12px; fill: #555; }
      .small { font-size: 10px; fill: #999; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#fafafa"/>
  <rect x="0" y="0" width="375" height="44" fill="#fff"/>

  <!-- ==================== TOP BAR ==================== -->
  <rect x="0" y="44" width="375" height="52" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="16" y="76" class="heading">Tags</text>
  <text x="16" y="92" class="small" fill="#888">42 tags</text>
  <rect x="316" y="58" width="48" height="28" rx="6" fill="#6366f1"/>
  <text x="340" y="76" font-size="10" fill="#fff" text-anchor="middle">+ New</text>

  <!-- ==================== SEARCH ==================== -->
  <rect x="16" y="104" width="343" height="32" rx="6" fill="#f3f4f6"/>
  <text x="36" y="124" class="body" fill="#aaa">Search tags...</text>

  <!-- ==================== TAG LIST ==================== -->
  <!-- Category: Characters (expanded) -->
  <rect x="0" y="148" width="375" height="36" fill="#f8fafc" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="16" y="170" font-size="13" fill="#111" font-weight="500">&#9662; Characters</text>
  <text x="360" y="170" class="small" text-anchor="end">18</text>

  <!-- Tag items -->
  <rect x="0" y="184" width="375" height="44" fill="#fff" stroke="#f3f4f6" stroke-width="0.5"/>
  <text x="36" y="210" class="body">Eren Yeager</text>
  <text x="340" y="210" class="small" text-anchor="end">23 images</text>
  <text x="360" y="210" class="body" fill="#ccc" text-anchor="end">&#8250;</text>

  <rect x="0" y="228" width="375" height="44" fill="#fff" stroke="#f3f4f6" stroke-width="0.5"/>
  <text x="36" y="254" class="body">Mikasa Ackerman</text>
  <text x="340" y="254" class="small" text-anchor="end">31 images</text>
  <text x="360" y="254" class="body" fill="#ccc" text-anchor="end">&#8250;</text>

  <rect x="0" y="272" width="375" height="44" fill="#fff" stroke="#f3f4f6" stroke-width="0.5"/>
  <text x="36" y="298" class="body">Armin Arlert</text>
  <text x="340" y="298" class="small" text-anchor="end">15 images</text>
  <text x="360" y="298" class="body" fill="#ccc" text-anchor="end">&#8250;</text>

  <rect x="0" y="316" width="375" height="44" fill="#fff" stroke="#f3f4f6" stroke-width="0.5"/>
  <text x="36" y="342" class="body">Levi Ackerman</text>
  <text x="340" y="342" class="small" text-anchor="end">28 images</text>
  <text x="360" y="342" class="body" fill="#ccc" text-anchor="end">&#8250;</text>

  <rect x="0" y="360" width="375" height="44" fill="#fff" stroke="#f3f4f6" stroke-width="0.5"/>
  <text x="36" y="386" class="body">Historia Reiss</text>
  <text x="340" y="386" class="small" text-anchor="end">8 images</text>
  <text x="360" y="386" class="body" fill="#ccc" text-anchor="end">&#8250;</text>

  <!-- Category: Scenes (collapsed) -->
  <rect x="0" y="404" width="375" height="36" fill="#f8fafc" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="16" y="426" font-size="13" fill="#111" font-weight="500">&#9656; Scenes</text>
  <text x="360" y="426" class="small" text-anchor="end">12</text>

  <!-- Category: Locations (collapsed) -->
  <rect x="0" y="440" width="375" height="36" fill="#f8fafc" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="16" y="462" font-size="13" fill="#111" font-weight="500">&#9656; Locations</text>
  <text x="360" y="462" class="small" text-anchor="end">6</text>

  <!-- Category: Objects (collapsed) -->
  <rect x="0" y="476" width="375" height="36" fill="#f8fafc" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="16" y="498" font-size="13" fill="#111" font-weight="500">&#9656; Objects</text>
  <text x="360" y="498" class="small" text-anchor="end">4</text>

  <!-- Category: Uncategorized -->
  <rect x="0" y="512" width="375" height="36" fill="#f8fafc" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="16" y="534" font-size="13" fill="#111" font-weight="500">&#9656; Uncategorized</text>
  <text x="360" y="534" class="small" text-anchor="end">2</text>

  <!-- Long-press hint -->
  <rect x="40" y="560" width="295" height="32" rx="8" fill="#f3f4f6"/>
  <text x="188" y="580" class="small" text-anchor="middle" fill="#888">Long press a tag for rename, merge, delete</text>

  <!-- ==================== BOTTOM NAV ==================== -->
  <rect x="0" y="748" width="375" height="64" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <g transform="translate(249, 756)">
    <rect x="0" y="0" width="56" height="40" rx="8" fill="#eef2ff"/>
    <text x="28" y="28" font-size="9" fill="#6366f1" text-anchor="middle" font-weight="500">Tags</text>
  </g>
  <g transform="translate(24, 756)">
    <text x="28" y="28" font-size="9" fill="#888" text-anchor="middle">Library</text>
  </g>
  <g transform="translate(99, 756)">
    <text x="28" y="28" font-size="9" fill="#888" text-anchor="middle">Search</text>
  </g>
  <g transform="translate(174, 756)">
    <text x="28" y="28" font-size="9" fill="#888" text-anchor="middle">Folders</text>
  </g>
  <g transform="translate(318, 756)">
    <text x="21" y="28" font-size="9" fill="#888" text-anchor="middle">More</text>
  </g>

  <text x="188" y="808" class="label" text-anchor="middle">Tap tag row to see detail; long-press for actions</text>
</svg>
