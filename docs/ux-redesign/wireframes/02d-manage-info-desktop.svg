<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
      .label { font-size: 11px; fill: #555; }
    </style>
  </defs>

  <!-- Background (anime detail page, dimmed) -->
  <rect width="1440" height="900" fill="#0f0f14"/>

  <!-- Icon rail dimmed -->
  <rect x="0" y="0" width="64" height="900" fill="#16161e" opacity="0.4"/>
  <rect x="12" y="14" width="40" height="40" rx="10" fill="#818cf8" opacity="0.4"/>
  <text x="32" y="40" font-size="20" fill="#fff" font-weight="700" text-anchor="middle" opacity="0.4">A</text>

  <!-- Dimmed header -->
  <rect x="64" y="0" width="1376" height="72" fill="#16161e" opacity="0.3"/>
  <text x="84" y="46" font-size="20" fill="#f1f5f9" font-weight="700" opacity="0.3">Attack on Titan</text>

  <!-- Dimmed image grid -->
  <g opacity="0.15">
    <rect x="84" y="120" width="260" height="174" rx="8" fill="#312e81"/>
    <rect x="354" y="120" width="260" height="210" rx="8" fill="#831843"/>
    <rect x="624" y="120" width="260" height="160" rx="8" fill="#14532d"/>
    <rect x="894" y="120" width="260" height="194" rx="8" fill="#713f12"/>
    <rect x="1164" y="120" width="260" height="174" rx="8" fill="#3b0764"/>
  </g>

  <!-- Dark overlay -->
  <rect width="1440" height="900" fill="#000" opacity="0.55"/>

  <!-- ==================== MANAGE DIALOG ==================== -->
  <rect x="144" y="90" width="1152" height="720" rx="16" fill="#16161e" stroke="#2d2d3f" stroke-width="1"/>

  <!-- Dialog header -->
  <rect x="144" y="90" width="1152" height="56" rx="16" fill="#1a1a26"/>
  <rect x="144" y="120" width="1152" height="26" fill="#1a1a26"/>

  <text x="176" y="125" font-size="16" fill="#f1f5f9" font-weight="600">Manage Attack on Titan</text>

  <!-- Close button -->
  <rect x="1252" y="102" width="32" height="32" rx="8" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
  <line x1="1262" y1="112" x2="1274" y2="124" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1274" y1="112" x2="1262" y2="124" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ==================== TAB BAR ==================== -->
  <rect x="144" y="146" width="1152" height="38" fill="#16161e"/>
  <line x1="144" y1="183" x2="1296" y2="183" stroke="#2d2d3f" stroke-width="1"/>

  <!-- Entries tab -->
  <text x="176" y="171" font-size="13" fill="#64748b">Entries</text>

  <!-- Characters tab -->
  <text x="246" y="171" font-size="13" fill="#64748b">Characters</text>

  <!-- Tags tab -->
  <text x="336" y="171" font-size="13" fill="#64748b">Tags</text>

  <!-- Info tab (active) -->
  <text x="396" y="171" font-size="13" fill="#818cf8" font-weight="600">Info</text>
  <rect x="396" y="176" width="24" height="2" rx="1" fill="#818cf8"/>

  <!-- ==================== INFO TAB CONTENT ==================== -->
  <!-- Centered content area (max-width ~700px) -->

  <!-- Section: Anime Name -->
  <rect x="320" y="200" width="800" height="120" rx="10" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>

  <text x="344" y="228" font-size="14" fill="#f1f5f9" font-weight="600">Anime Name</text>
  <text x="344" y="246" font-size="11" fill="#64748b">The display name for this anime in your library.</text>

  <rect x="344" y="260" width="500" height="32" rx="8" fill="#0f0f14" stroke="#2d2d3f" stroke-width="1"/>
  <text x="360" y="281" font-size="13" fill="#f1f5f9">Attack on Titan</text>

  <rect x="860" y="260" width="60" height="32" rx="8" fill="#818cf8"/>
  <text x="890" y="281" font-size="12" fill="#fff" text-anchor="middle" font-weight="500">Save</text>

  <rect x="930" y="260" width="60" height="32" rx="8" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
  <text x="960" y="281" font-size="12" fill="#94a3b8" text-anchor="middle">Reset</text>

  <!-- Section: AniList Integration -->
  <rect x="320" y="336" width="800" height="280" rx="10" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>

  <text x="344" y="364" font-size="14" fill="#f1f5f9" font-weight="600">AniList Integration</text>
  <text x="344" y="382" font-size="11" fill="#64748b">Link this anime to an AniList entry to import metadata.</text>

  <!-- Current link status (linked) -->
  <rect x="344" y="396" width="752" height="40" rx="8" fill="#1a3a2e" stroke="#22c55e" stroke-width="1"/>
  <circle cx="364" cy="416" r="6" fill="#22c55e"/>
  <text x="380" y="421" font-size="12" fill="#6ee7b7" font-weight="500">Linked to AniList</text>
  <text x="504" y="421" font-size="12" fill="#94a3b8">ID: 16498</text>
  <text x="592" y="421" font-size="11" fill="#64748b">Shingeki no Kyojin</text>

  <!-- Unlink button -->
  <rect x="1000" y="403" width="68" height="26" rx="6" fill="#1e1e2e" stroke="#ef4444" stroke-width="1"/>
  <text x="1034" y="421" font-size="11" fill="#ef4444" text-anchor="middle">Unlink</text>

  <!-- Divider -->
  <line x1="344" y1="450" x2="1096" y2="450" stroke="#2d2d3f" stroke-width="1"/>

  <!-- AniList search section -->
  <text x="344" y="472" font-size="12" fill="#94a3b8" font-weight="500">Search AniList</text>

  <!-- Search field -->
  <rect x="344" y="484" width="500" height="32" rx="8" fill="#0f0f14" stroke="#2d2d3f" stroke-width="1"/>
  <text x="360" y="505" font-size="12" fill="#475569">Search anime on AniList...</text>

  <rect x="856" y="484" width="64" height="32" rx="8" fill="#818cf8"/>
  <text x="888" y="505" font-size="12" fill="#fff" text-anchor="middle" font-weight="500">Search</text>

  <!-- Search results -->
  <text x="344" y="536" font-size="11" fill="#64748b">Results for "Attack on Titan"</text>

  <!-- Result 1 (currently linked - highlighted) -->
  <rect x="344" y="544" width="752" height="32" rx="6" fill="#312e81" stroke="#818cf8" stroke-width="1"/>
  <text x="360" y="565" font-size="12" fill="#f1f5f9" font-weight="500">Shingeki no Kyojin</text>
  <rect x="520" y="551" width="28" height="18" rx="4" fill="#1e1e2e"/>
  <text x="534" y="564" font-size="9" fill="#94a3b8" text-anchor="middle">TV</text>
  <text x="560" y="565" font-size="11" fill="#94a3b8">2013</text>
  <text x="608" y="565" font-size="10" fill="#22c55e">Linked</text>

  <!-- Result 2 -->
  <rect x="344" y="580" width="752" height="32" rx="6" fill="#1a1a26"/>
  <text x="360" y="601" font-size="12" fill="#f1f5f9">Shingeki no Kyojin Season 2</text>
  <rect x="564" y="587" width="28" height="18" rx="4" fill="#1e1e2e"/>
  <text x="578" y="600" font-size="9" fill="#94a3b8" text-anchor="middle">TV</text>
  <text x="604" y="601" font-size="11" fill="#94a3b8">2017</text>

  <!-- Section: Danger Zone -->
  <rect x="320" y="636" width="800" height="120" rx="10" fill="#1e1e2e" stroke="#3b1a1a" stroke-width="1"/>

  <text x="344" y="664" font-size="14" fill="#ef4444" font-weight="600">Danger Zone</text>
  <text x="344" y="682" font-size="11" fill="#64748b">These actions are destructive and cannot be undone.</text>

  <!-- Delete anime -->
  <rect x="344" y="698" width="752" height="40" rx="8" fill="#1a1a26"/>
  <g>
    <text x="360" y="722" font-size="12" fill="#f1f5f9">Delete this anime</text>
    <text x="360" y="736" font-size="10" fill="#64748b">Removes the anime, all entries, and their metadata. Images are NOT deleted from disk.</text>
  </g>

  <!-- Delete button -->
  <rect x="1000" y="706" width="88" height="28" rx="6" fill="#ef4444"/>
  <text x="1044" y="725" font-size="12" fill="#fff" text-anchor="middle" font-weight="500">Delete Anime</text>

  <!-- ==================== DIALOG FOOTER ==================== -->
  <rect x="144" y="770" width="1152" height="40" fill="#1a1a26"/>
  <rect x="144" y="786" width="1152" height="24" rx="16" fill="#1a1a26"/>
  <text x="176" y="796" font-size="11" fill="#64748b">Attack on Titan -- 5 entries -- 354 images</text>

  <!-- Annotation -->
  <text x="720" y="893" class="label" text-anchor="middle">Manage Dialog -- Info tab: anime name edit, AniList integration (linked state with search), danger zone with delete</text>
</svg>