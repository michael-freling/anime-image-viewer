<svg viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
    </style>
    <linearGradient id="mCardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.85)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#0f0f14"/>

  <!-- Status bar -->
  <text x="20" y="30" font-size="12" fill="#f1f5f9" font-weight="600">9:41</text>
  <text x="355" y="30" font-size="10" fill="#f1f5f9" text-anchor="end">100%</text>

  <!-- Compact header -->
  <text x="20" y="62" font-size="20" fill="#f1f5f9" font-weight="700">Home</text>
  <text x="20" y="78" font-size="11" fill="#64748b">24 anime -- 1,847 images</text>

  <!-- Action buttons (right) -->
  <rect x="256" y="48" width="52" height="28" rx="8" fill="#818cf8"/>
  <text x="282" y="67" font-size="11" fill="#fff" text-anchor="middle">+ Add</text>
  <rect x="314" y="48" width="48" height="28" rx="8" fill="#1e1e2e" stroke="#2d2d3f"/>
  <text x="338" y="67" font-size="11" fill="#94a3b8" text-anchor="middle">Import</text>

  <!-- Search bar -->
  <rect x="20" y="90" width="335" height="36" rx="18" fill="#1e1e2e" stroke="#2d2d3f"/>
  <circle cx="36" cy="108" r="6" fill="none" stroke="#475569" stroke-width="1.5"/>
  <line x1="40" y1="112" x2="44" y2="116" stroke="#475569" stroke-width="1.5"/>
  <text x="50" y="112" font-size="12" fill="#475569">Search...</text>

  <!-- Sort row -->
  <rect x="20" y="136" width="72" height="22" rx="11" fill="#1e1e2e" stroke="#2d2d3f"/>
  <text x="34" y="151" font-size="10" fill="#64748b">Sort: A-Z</text>

  <!-- Card grid (2 columns, cover-style) -->
  <!-- Row 1 -->
  <g transform="translate(20, 168)">
    <rect width="166" height="130" rx="10" fill="#312e81"/>
    <rect width="166" height="130" rx="10" fill="url(#mCardGrad)"/>
    <text x="83" y="52" font-size="10" fill="#818cf8" text-anchor="middle" opacity="0.5">Cover</text>
    <text x="8" y="110" font-size="12" fill="#f1f5f9" font-weight="600">Attack on Titan</text>
    <text x="8" y="124" font-size="9" fill="#94a3b8">342 images</text>
    <rect x="128" y="6" width="32" height="16" rx="8" fill="rgba(0,0,0,0.6)"/>
    <text x="144" y="18" font-size="9" fill="#f1f5f9" text-anchor="middle">342</text>
  </g>

  <g transform="translate(194, 168)">
    <rect width="166" height="130" rx="10" fill="#831843"/>
    <rect width="166" height="130" rx="10" fill="url(#mCardGrad)"/>
    <text x="83" y="52" font-size="10" fill="#f9a8d4" text-anchor="middle" opacity="0.5">Cover</text>
    <text x="8" y="110" font-size="12" fill="#f1f5f9" font-weight="600">Spy x Family</text>
    <text x="8" y="124" font-size="9" fill="#94a3b8">218 images</text>
    <rect x="128" y="6" width="32" height="16" rx="8" fill="rgba(0,0,0,0.6)"/>
    <text x="144" y="18" font-size="9" fill="#f1f5f9" text-anchor="middle">218</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(20, 308)">
    <rect width="166" height="130" rx="10" fill="#14532d"/>
    <rect width="166" height="130" rx="10" fill="url(#mCardGrad)"/>
    <text x="83" y="52" font-size="10" fill="#6ee7b7" text-anchor="middle" opacity="0.5">Cover</text>
    <text x="8" y="110" font-size="12" fill="#f1f5f9" font-weight="600">Jujutsu Kaisen</text>
    <text x="8" y="124" font-size="9" fill="#94a3b8">187 images</text>
  </g>

  <g transform="translate(194, 308)">
    <rect width="166" height="130" rx="10" fill="#713f12"/>
    <rect width="166" height="130" rx="10" fill="url(#mCardGrad)"/>
    <text x="83" y="52" font-size="10" fill="#fcd34d" text-anchor="middle" opacity="0.5">Cover</text>
    <text x="8" y="110" font-size="12" fill="#f1f5f9" font-weight="600">Demon Slayer</text>
    <text x="8" y="124" font-size="9" fill="#94a3b8">276 images</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(20, 448)">
    <rect width="166" height="130" rx="10" fill="#3b0764"/>
    <rect width="166" height="130" rx="10" fill="url(#mCardGrad)"/>
    <text x="83" y="52" font-size="10" fill="#c4b5fd" text-anchor="middle" opacity="0.5">Cover</text>
    <text x="8" y="110" font-size="12" fill="#f1f5f9" font-weight="600">Frieren</text>
    <text x="8" y="124" font-size="9" fill="#94a3b8">156 images</text>
  </g>

  <g transform="translate(194, 448)">
    <rect width="166" height="130" rx="10" fill="#1c1917"/>
    <rect width="166" height="130" rx="10" fill="url(#mCardGrad)"/>
    <text x="83" y="52" font-size="10" fill="#a8a29e" text-anchor="middle" opacity="0.5">Cover</text>
    <text x="8" y="110" font-size="12" fill="#f1f5f9" font-weight="600">Chainsaw Man</text>
    <text x="8" y="124" font-size="9" fill="#94a3b8">94 images</text>
  </g>

  <!-- Row 4 (partial, scroll indication) -->
  <g transform="translate(20, 588)">
    <rect width="166" height="130" rx="10" fill="#881337"/>
    <rect width="166" height="130" rx="10" fill="url(#mCardGrad)"/>
    <text x="8" y="110" font-size="12" fill="#f1f5f9" font-weight="600">Bocchi the Rock!</text>
    <text x="8" y="124" font-size="9" fill="#94a3b8">112 images</text>
  </g>

  <g transform="translate(194, 588)">
    <rect width="166" height="130" rx="10" fill="#134e4a"/>
    <rect width="166" height="130" rx="10" fill="url(#mCardGrad)"/>
    <text x="8" y="110" font-size="12" fill="#f1f5f9" font-weight="600">Oshi no Ko</text>
    <text x="8" y="124" font-size="9" fill="#94a3b8">203 images</text>
  </g>

  <!-- Bottom Tab Bar (4 items: Home, Search, Tags, Settings) -->
  <rect x="0" y="748" width="375" height="64" fill="#16161e" stroke="#2d2d3f" stroke-width="1"/>

  <!-- Home (active) -->
  <g transform="translate(18, 756)">
    <rect x="10" y="-2" width="52" height="28" rx="14" fill="#1e1e2e"/>
    <rect x="24" y="4" width="24" height="16" rx="3" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <text x="36" y="40" font-size="10" fill="#818cf8" text-anchor="middle" font-weight="500">Home</text>
  </g>

  <!-- Search -->
  <g transform="translate(108, 756)">
    <circle cx="36" cy="12" r="8" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <line x1="42" y1="18" x2="48" y2="24" stroke="#64748b" stroke-width="1.5"/>
    <text x="36" y="40" font-size="10" fill="#64748b" text-anchor="middle">Search</text>
  </g>

  <!-- Tags -->
  <g transform="translate(198, 756)">
    <rect x="20" y="4" width="24" height="16" rx="5" fill="none" stroke="#64748b" stroke-width="1.5" transform="rotate(-8, 32, 12)"/>
    <text x="36" y="40" font-size="10" fill="#64748b" text-anchor="middle">Tags</text>
  </g>

  <!-- Settings -->
  <g transform="translate(288, 756)">
    <circle cx="36" cy="12" r="10" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="36" cy="12" r="3.5" fill="#64748b"/>
    <text x="36" y="40" font-size="10" fill="#64748b" text-anchor="middle">Settings</text>
  </g>
</svg>