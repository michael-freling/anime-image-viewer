<svg viewBox="0 0 3840 2160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
      .label { font-size: 22px; fill: #888; }
      .heading { font-size: 36px; fill: #f1f5f9; font-weight: 700; }
      .body { font-size: 24px; fill: #94a3b8; }
      .small { font-size: 20px; fill: #64748b; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="3840" height="2160" fill="#0f0f14"/>

  <!-- Icon rail -->
  <rect x="0" y="0" width="80" height="2160" fill="#16161e"/>
  <rect x="16" y="20" width="48" height="48" rx="12" fill="#818cf8"/>
  <text x="40" y="52" font-size="28" fill="#fff" font-weight="700" text-anchor="middle">A</text>

  <!-- ==================== TOP: Selected images strip + actions ==================== -->
  <rect x="80" y="0" width="3760" height="180" fill="#16161e"/>

  <!-- Header -->
  <text x="160" y="44" font-size="28" fill="#818cf8">Home / Attack on Titan</text>
  <text x="160" y="80" class="heading" font-size="36">Edit Tags</text>
  <text x="160" y="114" class="body">8 images selected</text>

  <!-- Action buttons (right) -->
  <rect x="3280" y="24" width="200" height="52" rx="12" fill="#818cf8"/>
  <text x="3380" y="58" font-size="24" fill="#fff" text-anchor="middle" font-weight="500">Apply Changes</text>
  <rect x="3500" y="24" width="140" height="52" rx="12" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1.5"/>
  <text x="3570" y="58" font-size="24" fill="#94a3b8" text-anchor="middle">Cancel</text>

  <!-- Selected images thumbnail strip -->
  <g transform="translate(160, 130)">
    <rect width="80" height="40" rx="6" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
    <rect x="88" width="80" height="40" rx="6" fill="#831843" stroke="#818cf8" stroke-width="2"/>
    <rect x="176" width="80" height="40" rx="6" fill="#14532d" stroke="#818cf8" stroke-width="2"/>
    <rect x="264" width="80" height="40" rx="6" fill="#713f12" stroke="#818cf8" stroke-width="2"/>
    <rect x="352" width="80" height="40" rx="6" fill="#3b0764" stroke="#818cf8" stroke-width="2"/>
    <rect x="440" width="80" height="40" rx="6" fill="#1c1917" stroke="#818cf8" stroke-width="2"/>
    <rect x="528" width="80" height="40" rx="6" fill="#881337" stroke="#818cf8" stroke-width="2"/>
    <rect x="616" width="80" height="40" rx="6" fill="#134e4a" stroke="#818cf8" stroke-width="2"/>
  </g>

  <!-- ==================== MAIN AREA: Full-width tag tree (manual only, NO ML panel) ==================== -->

  <!-- Tag search -->
  <rect x="160" y="210" width="800" height="56" rx="28" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
  <text x="200" y="246" font-size="22" fill="#475569">Search tags to add or remove...</text>

  <!-- Pending changes summary bar -->
  <rect x="1100" y="210" width="2560" height="56" rx="12" fill="#1a1a40" stroke="#818cf8" stroke-width="1"/>
  <text x="1140" y="246" font-size="22" fill="#818cf8">Pending changes:</text>
  <rect x="1400" y="222" width="100" height="32" rx="16" fill="#1a3a2e" stroke="#6ee7b7" stroke-width="1"/>
  <text x="1450" y="244" font-size="18" fill="#6ee7b7" text-anchor="middle">+ Outdoor</text>
  <rect x="1520" y="222" width="120" height="32" rx="16" fill="#3b1a1a" stroke="#fca5a5" stroke-width="1"/>
  <text x="1580" y="244" font-size="18" fill="#fca5a5" text-anchor="middle">- Indoor</text>
  <text x="3620" y="246" font-size="20" fill="#475569" text-anchor="end">2 changes to apply</text>

  <!-- ==================== TAG TREE (full width, 3 columns of categories) ==================== -->
  <!-- Column 1: Characters -->
  <g transform="translate(160, 300)">
    <text x="0" y="30" font-size="26" fill="#f1f5f9" font-weight="600">Characters</text>

    <!-- Tri-state checkbox rows -->
    <g transform="translate(0, 50)">
      <!-- Checked -->
      <rect x="0" y="0" width="1100" height="56" rx="10" fill="#1e1e2e"/>
      <rect x="16" y="14" width="28" height="28" rx="6" fill="#818cf8"/>
      <text x="30" y="36" font-size="18" fill="#fff" text-anchor="middle">V</text>
      <text x="60" y="36" font-size="24" fill="#f1f5f9">Eren</text>
      <text x="1060" y="36" font-size="20" fill="#64748b" text-anchor="end">86 images</text>
    </g>

    <g transform="translate(0, 114)">
      <!-- Indeterminate (dash) -->
      <rect x="0" y="0" width="1100" height="56" rx="10" fill="#1e1e2e"/>
      <rect x="16" y="14" width="28" height="28" rx="6" fill="transparent" stroke="#818cf8" stroke-width="2"/>
      <line x1="22" y1="28" x2="38" y2="28" stroke="#818cf8" stroke-width="3"/>
      <text x="60" y="36" font-size="24" fill="#f1f5f9">Mikasa</text>
      <text x="220" y="36" font-size="18" fill="#475569">(5 of 8 selected have this)</text>
      <text x="1060" y="36" font-size="20" fill="#64748b" text-anchor="end">72 images</text>
    </g>

    <g transform="translate(0, 178)">
      <!-- Unchecked -->
      <rect x="0" y="0" width="1100" height="56" rx="10" fill="#1e1e2e"/>
      <rect x="16" y="14" width="28" height="28" rx="6" fill="transparent" stroke="#2d2d3f" stroke-width="2"/>
      <text x="60" y="36" font-size="24" fill="#f1f5f9">Armin</text>
      <text x="1060" y="36" font-size="20" fill="#64748b" text-anchor="end">54 images</text>
    </g>

    <g transform="translate(0, 242)">
      <rect x="0" y="0" width="1100" height="56" rx="10" fill="#1e1e2e"/>
      <rect x="16" y="14" width="28" height="28" rx="6" fill="transparent" stroke="#2d2d3f" stroke-width="2"/>
      <text x="60" y="36" font-size="24" fill="#f1f5f9">Levi</text>
      <text x="1060" y="36" font-size="20" fill="#64748b" text-anchor="end">48 images</text>
    </g>

    <g transform="translate(0, 306)">
      <rect x="0" y="0" width="1100" height="56" rx="10" fill="#1e1e2e"/>
      <rect x="16" y="14" width="28" height="28" rx="6" fill="transparent" stroke="#2d2d3f" stroke-width="2"/>
      <text x="60" y="36" font-size="24" fill="#f1f5f9">Historia</text>
      <text x="1060" y="36" font-size="20" fill="#64748b" text-anchor="end">32 images</text>
    </g>
  </g>

  <!-- Column 2: Scenes -->
  <g transform="translate(1340, 300)">
    <text x="0" y="30" font-size="26" fill="#f1f5f9" font-weight="600">Scenes</text>

    <g transform="translate(0, 50)">
      <!-- Being added (green highlight) -->
      <rect x="0" y="0" width="1100" height="56" rx="10" fill="#0a2e1a" stroke="#6ee7b7" stroke-width="1"/>
      <rect x="16" y="14" width="28" height="28" rx="6" fill="#6ee7b7"/>
      <text x="30" y="36" font-size="18" fill="#0a0a0f" text-anchor="middle">V</text>
      <text x="60" y="36" font-size="24" fill="#6ee7b7">Outdoor</text>
      <text x="280" y="36" font-size="18" fill="#6ee7b7">adding to all 8</text>
      <text x="1060" y="36" font-size="20" fill="#64748b" text-anchor="end">124 images</text>
    </g>

    <g transform="translate(0, 114)">
      <!-- Being removed (red highlight) -->
      <rect x="0" y="0" width="1100" height="56" rx="10" fill="#2e0a0a" stroke="#fca5a5" stroke-width="1"/>
      <rect x="16" y="14" width="28" height="28" rx="6" fill="transparent" stroke="#fca5a5" stroke-width="2"/>
      <text x="60" y="36" font-size="24" fill="#fca5a5" text-decoration="line-through">Indoor</text>
      <text x="260" y="36" font-size="18" fill="#fca5a5">removing from all 8</text>
      <text x="1060" y="36" font-size="20" fill="#64748b" text-anchor="end">98 images</text>
    </g>

    <g transform="translate(0, 178)">
      <rect x="0" y="0" width="1100" height="56" rx="10" fill="#1e1e2e"/>
      <rect x="16" y="14" width="28" height="28" rx="6" fill="transparent" stroke="#2d2d3f" stroke-width="2"/>
      <text x="60" y="36" font-size="24" fill="#f1f5f9">Action</text>
      <text x="1060" y="36" font-size="20" fill="#64748b" text-anchor="end">156 images</text>
    </g>

    <g transform="translate(0, 242)">
      <rect x="0" y="0" width="1100" height="56" rx="10" fill="#1e1e2e"/>
      <rect x="16" y="14" width="28" height="28" rx="6" fill="transparent" stroke="#2d2d3f" stroke-width="2"/>
      <text x="60" y="36" font-size="24" fill="#f1f5f9">Romance</text>
      <text x="1060" y="36" font-size="20" fill="#64748b" text-anchor="end">42 images</text>
    </g>
  </g>

  <!-- Column 3: Locations -->
  <g transform="translate(2520, 300)">
    <text x="0" y="30" font-size="26" fill="#f1f5f9" font-weight="600">Locations</text>

    <g transform="translate(0, 50)">
      <rect x="0" y="0" width="1100" height="56" rx="10" fill="#1e1e2e"/>
      <rect x="16" y="14" width="28" height="28" rx="6" fill="#818cf8"/>
      <text x="30" y="36" font-size="18" fill="#fff" text-anchor="middle">V</text>
      <text x="60" y="36" font-size="24" fill="#f1f5f9">School</text>
      <text x="1060" y="36" font-size="20" fill="#64748b" text-anchor="end">89 images</text>
    </g>

    <g transform="translate(0, 114)">
      <rect x="0" y="0" width="1100" height="56" rx="10" fill="#1e1e2e"/>
      <rect x="16" y="14" width="28" height="28" rx="6" fill="transparent" stroke="#2d2d3f" stroke-width="2"/>
      <text x="60" y="36" font-size="24" fill="#f1f5f9">City</text>
      <text x="1060" y="36" font-size="20" fill="#64748b" text-anchor="end">67 images</text>
    </g>

    <g transform="translate(0, 178)">
      <rect x="0" y="0" width="1100" height="56" rx="10" fill="#1e1e2e"/>
      <rect x="16" y="14" width="28" height="28" rx="6" fill="transparent" stroke="#2d2d3f" stroke-width="2"/>
      <text x="60" y="36" font-size="24" fill="#f1f5f9">Forest</text>
      <text x="1060" y="36" font-size="20" fill="#64748b" text-anchor="end">34 images</text>
    </g>
  </g>

  <!-- Annotations -->
  <text x="1960" y="2100" class="label" text-anchor="middle">Manual tag editor ONLY -- No ML suggestions -- Full-width multi-column layout with tri-state checkboxes</text>
  <text x="1960" y="2140" class="label" text-anchor="middle">Green highlight = adding -- Red highlight = removing -- Indeterminate = partial selection</text>
</svg>
