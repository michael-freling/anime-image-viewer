<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
      .label { font-size: 11px; fill: #888; }
      .heading { font-size: 18px; fill: #111; font-weight: 600; }
      .subheading { font-size: 14px; fill: #111; font-weight: 500; }
      .body { font-size: 12px; fill: #555; }
      .small { font-size: 10px; fill: #999; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="#fafafa"/>

  <!-- ==================== TOP BAR ==================== -->
  <rect x="0" y="0" width="1440" height="56" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="24" y="34" font-size="18" fill="#6366f1">&#8592;</text>
  <text x="48" y="34" class="subheading">Edit Tags for 8 images</text>

  <!-- Action buttons -->
  <rect x="1260" y="14" width="80" height="28" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="1300" y="32" font-size="11" fill="#555" text-anchor="middle">Cancel</text>
  <rect x="1352" y="14" width="72" height="28" rx="6" fill="#6366f1"/>
  <text x="1388" y="32" font-size="11" fill="#fff" text-anchor="middle">Apply</text>

  <!-- ==================== SIDEBAR ==================== -->
  <rect x="0" y="56" width="64" height="844" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ==================== SELECTED IMAGES STRIP (top) ==================== -->
  <rect x="64" y="56" width="1376" height="120" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="84" y="80" font-size="11" fill="#888" font-weight="500" letter-spacing="1">SELECTED IMAGES (8)</text>

  <!-- Image thumbnails -->
  <rect x="84" y="90" width="80" height="72" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="124" y="130" class="small" fill="#a5b4fc" text-anchor="middle">1</text>
  <rect x="172" y="90" width="80" height="72" rx="6" fill="#fce7f3"/>
  <text x="212" y="130" class="small" fill="#f9a8d4" text-anchor="middle">2</text>
  <rect x="260" y="90" width="80" height="72" rx="6" fill="#d1fae5"/>
  <text x="300" y="130" class="small" fill="#6ee7b7" text-anchor="middle">3</text>
  <rect x="348" y="90" width="80" height="72" rx="6" fill="#fef3c7"/>
  <text x="388" y="130" class="small" fill="#fcd34d" text-anchor="middle">4</text>
  <rect x="436" y="90" width="80" height="72" rx="6" fill="#ddd6fe"/>
  <text x="476" y="130" class="small" fill="#c4b5fd" text-anchor="middle">5</text>
  <rect x="524" y="90" width="80" height="72" rx="6" fill="#fbcfe8"/>
  <text x="564" y="130" class="small" fill="#f9a8d4" text-anchor="middle">6</text>
  <rect x="612" y="90" width="80" height="72" rx="6" fill="#ccfbf1"/>
  <text x="652" y="130" class="small" fill="#5eead4" text-anchor="middle">7</text>
  <rect x="700" y="90" width="80" height="72" rx="6" fill="#fee2e2"/>
  <text x="740" y="130" class="small" fill="#fca5a5" text-anchor="middle">8</text>

  <!-- ==================== MAIN AREA: Split into tag tree + ML suggestions ==================== -->

  <!-- LEFT: TAG TREE (checkboxes) -->
  <rect x="64" y="176" width="500" height="724" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>

  <text x="84" y="204" font-size="13" fill="#111" font-weight="500">Select Tags</text>
  <rect x="84" y="216" width="460" height="28" rx="6" fill="#f3f4f6"/>
  <text x="104" y="234" class="body" fill="#aaa">Search tags...</text>

  <!-- Tag tree with checkboxes -->
  <!-- Characters -->
  <text x="84" y="268" font-size="12" fill="#111" font-weight="500">&#9662; Characters</text>

  <!-- Checkbox: Checked (all selected images have this tag) -->
  <g transform="translate(100, 278)">
    <rect width="14" height="14" rx="3" fill="#6366f1" stroke="#6366f1" stroke-width="1"/>
    <text x="7" y="11" font-size="10" fill="#fff" text-anchor="middle">v</text>
    <text x="22" y="12" class="body">Eren Yeager</text>
    <text x="420" y="12" class="small" text-anchor="end">8/8 selected</text>
  </g>

  <!-- Checkbox: Indeterminate (some images have this) -->
  <g transform="translate(100, 302)">
    <rect width="14" height="14" rx="3" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
    <line x1="4" y1="7" x2="10" y2="7" stroke="#6366f1" stroke-width="2"/>
    <text x="22" y="12" class="body">Mikasa Ackerman</text>
    <text x="420" y="12" class="small" text-anchor="end">3/8 selected</text>
  </g>

  <!-- Checkbox: Unchecked -->
  <g transform="translate(100, 326)">
    <rect width="14" height="14" rx="3" fill="#fff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="22" y="12" class="body">Armin Arlert</text>
    <text x="420" y="12" class="small" text-anchor="end">0/8</text>
  </g>

  <g transform="translate(100, 350)">
    <rect width="14" height="14" rx="3" fill="#fff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="22" y="12" class="body">Levi Ackerman</text>
    <text x="420" y="12" class="small" text-anchor="end">0/8</text>
  </g>

  <!-- Scenes -->
  <text x="84" y="388" font-size="12" fill="#111" font-weight="500">&#9662; Scenes</text>

  <g transform="translate(100, 398)">
    <rect width="14" height="14" rx="3" fill="#6366f1" stroke="#6366f1" stroke-width="1"/>
    <text x="7" y="11" font-size="10" fill="#fff" text-anchor="middle">v</text>
    <text x="22" y="12" class="body">Action</text>
    <text x="420" y="12" class="small" text-anchor="end">8/8</text>
  </g>

  <g transform="translate(100, 422)">
    <rect width="14" height="14" rx="3" fill="#fff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="22" y="12" class="body">Romance</text>
    <text x="420" y="12" class="small" text-anchor="end">0/8</text>
  </g>

  <g transform="translate(100, 446)">
    <rect width="14" height="14" rx="3" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
    <line x1="4" y1="7" x2="10" y2="7" stroke="#6366f1" stroke-width="2"/>
    <text x="22" y="12" class="body">Comedy</text>
    <text x="420" y="12" class="small" text-anchor="end">2/8</text>
  </g>

  <!-- Locations -->
  <text x="84" y="484" font-size="12" fill="#111" font-weight="500">&#9656; Locations</text>

  <!-- Pending changes summary -->
  <rect x="84" y="840" width="460" height="48" rx="8" fill="#eef2ff"/>
  <text x="104" y="862" font-size="11" fill="#6366f1" font-weight="500">Pending: +2 tags added, -1 tag removed</text>
  <text x="104" y="878" font-size="10" fill="#818cf8">Click Apply to save changes</text>

  <!-- ==================== RIGHT: ML TAG SUGGESTIONS ==================== -->
  <rect x="564" y="176" width="876" height="724" fill="#fafafa"/>

  <text x="584" y="204" font-size="13" fill="#111" font-weight="500">ML Suggestions</text>

  <!-- Confidence slider -->
  <text x="584" y="228" class="body">Min confidence:</text>
  <rect x="700" y="220" width="200" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="700" y="220" width="120" height="6" rx="3" fill="#6366f1"/>
  <circle cx="820" cy="223" r="8" fill="#6366f1"/>
  <text x="840" y="228" font-size="11" fill="#555">60%</text>

  <!-- Apply all button -->
  <rect x="1300" y="194" width="120" height="28" rx="6" fill="#6366f1"/>
  <text x="1360" y="212" font-size="10" fill="#fff" text-anchor="middle">Apply All (12)</text>

  <line x1="584" y1="244" x2="1420" y2="244" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Suggestion cards: image + suggested tags -->
  <!-- Card 1 -->
  <rect x="584" y="256" width="408" height="200" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="592" y="264" width="140" height="140" rx="6" fill="#e0e7ff"/>
  <text x="662" y="338" class="small" fill="#a5b4fc" text-anchor="middle">Image 1</text>

  <!-- Existing tags -->
  <text x="744" y="282" font-size="10" fill="#888">Current:</text>
  <rect x="744" y="288" width="52" height="20" rx="10" fill="#312e81"/>
  <text x="770" y="302" font-size="9" fill="#a5b4fc" text-anchor="middle">Eren</text>
  <rect x="802" y="288" width="56" height="20" rx="10" fill="#312e81"/>
  <text x="830" y="302" font-size="9" fill="#a5b4fc" text-anchor="middle">Action</text>

  <!-- Suggested tags -->
  <text x="744" y="330" font-size="10" fill="#888">Suggested:</text>
  <rect x="744" y="336" width="76" height="20" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="782" y="350" font-size="9" fill="#16a34a" text-anchor="middle">Sunset 87%</text>
  <rect x="826" y="336" width="80" height="20" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="866" y="350" font-size="9" fill="#16a34a" text-anchor="middle">Mikasa 72%</text>
  <rect x="912" y="336" width="60" height="20" rx="10" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="942" y="350" font-size="9" fill="#888" text-anchor="middle">Sky 45%</text>

  <!-- Per-image accept button -->
  <rect x="744" y="418" width="80" height="24" rx="6" fill="#6366f1"/>
  <text x="784" y="434" font-size="10" fill="#fff" text-anchor="middle">Accept 2</text>
  <rect x="832" y="418" width="60" height="24" rx="6" fill="#f3f4f6"/>
  <text x="862" y="434" font-size="10" fill="#555" text-anchor="middle">Skip</text>

  <!-- Checkbox overlay -->
  <rect x="592" y="264" width="20" height="20" rx="4" fill="#6366f1"/>
  <text x="602" y="278" font-size="12" fill="#fff" text-anchor="middle">v</text>

  <!-- Card 2 -->
  <rect x="1004" y="256" width="408" height="200" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="1012" y="264" width="140" height="140" rx="6" fill="#fce7f3"/>
  <text x="1082" y="338" class="small" fill="#f9a8d4" text-anchor="middle">Image 2</text>
  <text x="1164" y="282" font-size="10" fill="#888">Current:</text>
  <rect x="1164" y="288" width="52" height="20" rx="10" fill="#312e81"/>
  <text x="1190" y="302" font-size="9" fill="#a5b4fc" text-anchor="middle">Eren</text>
  <text x="1164" y="330" font-size="10" fill="#888">Suggested:</text>
  <rect x="1164" y="336" width="80" height="20" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="1204" y="350" font-size="9" fill="#16a34a" text-anchor="middle">Battle 91%</text>
  <rect x="1250" y="336" width="76" height="20" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="1288" y="350" font-size="9" fill="#16a34a" text-anchor="middle">Levi 68%</text>
  <rect x="1012" y="264" width="20" height="20" rx="4" fill="#6366f1"/>
  <text x="1022" y="278" font-size="12" fill="#fff" text-anchor="middle">v</text>

  <!-- Card 3+ (partial) -->
  <rect x="584" y="468" width="408" height="200" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="592" y="476" width="140" height="140" rx="6" fill="#d1fae5"/>
  <rect x="592" y="476" width="20" height="20" rx="4" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="1004" y="468" class="body" fill="#ccc">...</text>

  <rect x="1004" y="468" width="408" height="200" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="1012" y="476" width="140" height="140" rx="6" fill="#fef3c7"/>
  <rect x="1012" y="476" width="20" height="20" rx="4" fill="#fff" stroke="#d1d5db" stroke-width="1"/>

  <!-- Annotation -->
  <text x="340" y="890" class="label" text-anchor="middle">Tri-state checkboxes show shared tag state</text>
  <text x="940" y="890" class="label" text-anchor="middle">ML suggestions inline -- accept/skip per image</text>
</svg>
