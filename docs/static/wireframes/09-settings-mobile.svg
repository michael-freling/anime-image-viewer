<svg viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
      .label { font-size: 10px; fill: #888; }
      .heading { font-size: 17px; fill: #111; font-weight: 600; }
      .subheading { font-size: 13px; fill: #111; font-weight: 500; }
      .body { font-size: 12px; fill: #555; }
      .small { font-size: 10px; fill: #999; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#fafafa"/>
  <rect x="0" y="0" width="375" height="44" fill="#fff"/>

  <!-- ==================== TOP BAR ==================== -->
  <rect x="0" y="44" width="375" height="48" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="16" y="72" font-size="16" fill="#888">&#8592;</text>
  <text x="42" y="72" class="heading" font-size="15">Settings</text>

  <!-- ==================== SETTINGS LIST (grouped) ==================== -->

  <!-- General section -->
  <text x="16" y="116" font-size="11" fill="#888" font-weight="500" letter-spacing="1">DIRECTORIES</text>

  <rect x="0" y="124" width="375" height="48" fill="#fff" stroke="#f3f4f6" stroke-width="0.5"/>
  <text x="16" y="146" class="body" font-weight="500">Image Root</text>
  <text x="16" y="162" class="small" fill="#888">/home/user/anime-images</text>
  <text x="360" y="152" class="body" fill="#ccc" text-anchor="end">&#8250;</text>

  <rect x="0" y="172" width="375" height="48" fill="#fff" stroke="#f3f4f6" stroke-width="0.5"/>
  <text x="16" y="194" class="body" font-weight="500">Config Directory</text>
  <text x="16" y="210" class="small" fill="#888">~/.config/anime-image-viewer</text>
  <text x="360" y="200" class="body" fill="#ccc" text-anchor="end">&#8250;</text>

  <rect x="0" y="220" width="375" height="48" fill="#fff" stroke="#f3f4f6" stroke-width="0.5"/>
  <text x="16" y="242" class="body" font-weight="500">Log Directory</text>
  <text x="16" y="258" class="small" fill="#888">~/.local/log/anime-image-viewer</text>
  <text x="360" y="248" class="body" fill="#ccc" text-anchor="end">&#8250;</text>

  <rect x="0" y="268" width="375" height="48" fill="#fff" stroke="#f3f4f6" stroke-width="0.5"/>
  <text x="16" y="290" class="body" font-weight="500">Backup Directory</text>
  <text x="16" y="306" class="small" fill="#888">~/backups/anime-image-viewer</text>
  <text x="360" y="296" class="body" fill="#ccc" text-anchor="end">&#8250;</text>

  <!-- Appearance section -->
  <text x="16" y="344" font-size="11" fill="#888" font-weight="500" letter-spacing="1">APPEARANCE</text>

  <rect x="0" y="352" width="375" height="48" fill="#fff" stroke="#f3f4f6" stroke-width="0.5"/>
  <text x="16" y="378" class="body" font-weight="500">Theme</text>
  <text x="340" y="378" class="body" fill="#888" text-anchor="end">System</text>
  <text x="360" y="378" class="body" fill="#ccc" text-anchor="end">&#8250;</text>

  <rect x="0" y="400" width="375" height="48" fill="#fff" stroke="#f3f4f6" stroke-width="0.5"/>
  <text x="16" y="426" class="body" font-weight="500">Grid Columns</text>
  <text x="340" y="426" class="body" fill="#888" text-anchor="end">Auto</text>
  <text x="360" y="426" class="body" fill="#ccc" text-anchor="end">&#8250;</text>

  <!-- Backup section -->
  <text x="16" y="476" font-size="11" fill="#888" font-weight="500" letter-spacing="1">BACKUP</text>

  <rect x="0" y="484" width="375" height="48" fill="#fff" stroke="#f3f4f6" stroke-width="0.5"/>
  <text x="16" y="510" class="body" font-weight="500">Idle Backup</text>
  <rect x="316" y="500" width="36" height="20" rx="10" fill="#6366f1"/>
  <circle cx="342" cy="510" r="8" fill="#fff"/>

  <rect x="0" y="532" width="375" height="48" fill="#fff" stroke="#f3f4f6" stroke-width="0.5"/>
  <text x="16" y="554" class="body" font-weight="500">Idle Minutes</text>
  <text x="340" y="554" class="body" fill="#888" text-anchor="end">30</text>

  <rect x="0" y="580" width="375" height="48" fill="#fff" stroke="#f3f4f6" stroke-width="0.5"/>
  <text x="16" y="602" class="body" font-weight="500">Retention Count</text>
  <text x="340" y="602" class="body" fill="#888" text-anchor="end">5</text>

  <rect x="0" y="628" width="375" height="48" fill="#fff" stroke="#f3f4f6" stroke-width="0.5"/>
  <text x="16" y="654" class="body" font-weight="500">Include Images</text>
  <rect x="316" y="644" width="36" height="20" rx="10" fill="#e5e7eb"/>
  <circle cx="326" cy="654" r="8" fill="#fff"/>

  <!-- About section -->
  <text x="16" y="704" font-size="11" fill="#888" font-weight="500" letter-spacing="1">ABOUT</text>

  <rect x="0" y="712" width="375" height="36" fill="#fff" stroke="#f3f4f6" stroke-width="0.5"/>
  <text x="16" y="734" class="body" font-weight="500">Version</text>
  <text x="340" y="734" class="body" fill="#888" text-anchor="end">1.0.0</text>

  <!-- Bottom nav not shown -- accessed from "More" -->

  <text x="188" y="808" class="label" text-anchor="middle">Native iOS-style settings list</text>
</svg>
