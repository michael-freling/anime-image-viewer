<svg viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
      .label { font-size: 10px; fill: #888; }
      .body { font-size: 12px; fill: #ccc; }
      .small { font-size: 10px; fill: #999; }
    </style>
  </defs>

  <!-- Full-screen dark background -->
  <rect width="375" height="812" fill="#111"/>

  <!-- ==================== TOP BAR (fades on tap) ==================== -->
  <rect x="0" y="0" width="375" height="64" fill="#111" opacity="0.85"/>
  <text x="20" y="40" font-size="18" fill="#fff">&#10005;</text>
  <text x="188" y="36" font-size="12" fill="#ccc" text-anchor="middle">5 of 342</text>
  <text x="188" y="52" font-size="9" fill="#666" text-anchor="middle">screenshot_001.png</text>

  <!-- Zoom fit -->
  <rect x="310" y="22" width="24" height="24" rx="4" fill="#333"/>
  <text x="322" y="38" font-size="11" fill="#fff" text-anchor="middle">Fit</text>

  <!-- Tag button -->
  <rect x="342" y="22" width="24" height="24" rx="4" fill="#6366f1"/>
  <text x="354" y="37" font-size="10" fill="#fff" text-anchor="middle">T</text>

  <!-- ==================== MAIN IMAGE (full screen, pinch-to-zoom) ==================== -->
  <rect x="0" y="64" width="375" height="560" fill="#1a1a2e"/>
  <rect x="20" y="164" width="335" height="220" rx="4" fill="#222244" opacity="0.5"/>
  <text x="188" y="280" font-size="12" fill="#444" text-anchor="middle">Pinch to zoom -- swipe to navigate</text>

  <!-- ==================== BOTTOM INFO OVERLAY ==================== -->
  <rect x="0" y="624" width="375" height="188" fill="#1a1a1a" opacity="0.9" rx="16"/>

  <!-- Tags -->
  <text x="16" y="648" font-size="10" fill="#888" font-weight="500">TAGS</text>

  <rect x="16" y="656" width="56" height="22" rx="11" fill="#312e81"/>
  <text x="44" y="670" font-size="9" fill="#a5b4fc" text-anchor="middle">Action</text>
  <rect x="78" y="656" width="48" height="22" rx="11" fill="#312e81"/>
  <text x="102" y="670" font-size="9" fill="#a5b4fc" text-anchor="middle">Eren</text>
  <rect x="132" y="656" width="64" height="22" rx="11" fill="#312e81"/>
  <text x="164" y="670" font-size="9" fill="#a5b4fc" text-anchor="middle">Outdoor</text>
  <rect x="202" y="656" width="54" height="22" rx="11" fill="#312e81"/>
  <text x="229" y="670" font-size="9" fill="#a5b4fc" text-anchor="middle">Battle</text>

  <!-- Edit tags button -->
  <rect x="268" y="656" width="92" height="22" rx="11" fill="#6366f1"/>
  <text x="314" y="670" font-size="9" fill="#fff" text-anchor="middle">Edit Tags</text>

  <line x1="16" y1="690" x2="359" y2="690" stroke="#333" stroke-width="1"/>

  <!-- ML Suggestions -->
  <text x="16" y="708" font-size="10" fill="#888" font-weight="500">ML SUGGESTED</text>

  <rect x="16" y="716" width="72" height="22" rx="11" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="52" y="730" font-size="9" fill="#4ade80" text-anchor="middle">Sunset 87%</text>
  <rect x="94" y="716" width="76" height="22" rx="11" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="132" y="730" font-size="9" fill="#4ade80" text-anchor="middle">Mikasa 72%</text>

  <!-- Apply button -->
  <rect x="16" y="748" width="343" height="36" rx="8" fill="#6366f1"/>
  <text x="188" y="770" font-size="11" fill="#fff" text-anchor="middle">Apply 2 Suggestions</text>

  <!-- ==================== THUMBNAIL STRIP ==================== -->
  <rect x="0" y="792" width="375" height="20" fill="#0a0a0a"/>
  <rect x="16" y="794" width="30" height="16" rx="2" fill="#333"/>
  <rect x="50" y="794" width="30" height="16" rx="2" fill="#444"/>
  <rect x="84" y="794" width="30" height="16" rx="2" fill="#333"/>
  <rect x="118" y="794" width="30" height="16" rx="2" fill="#444"/>
  <!-- Active -->
  <rect x="152" y="793" width="32" height="18" rx="2" fill="#555" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="188" y="794" width="30" height="16" rx="2" fill="#333"/>
  <rect x="222" y="794" width="30" height="16" rx="2" fill="#444"/>
  <rect x="256" y="794" width="30" height="16" rx="2" fill="#333"/>
  <rect x="290" y="794" width="30" height="16" rx="2" fill="#444"/>
  <rect x="324" y="794" width="30" height="16" rx="2" fill="#333"/>
</svg>
