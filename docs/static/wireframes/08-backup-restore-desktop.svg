<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
      .label { font-size: 11px; fill: #888; }
      .heading { font-size: 18px; fill: #111; font-weight: 600; }
      .subheading { font-size: 14px; fill: #111; font-weight: 500; }
      .body { font-size: 12px; fill: #555; }
      .small { font-size: 10px; fill: #999; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="#fafafa"/>

  <!-- ==================== TOP BAR ==================== -->
  <rect x="0" y="0" width="1440" height="56" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="24" y="14" width="28" height="28" rx="6" fill="#6366f1"/>
  <text x="40" y="33" font-size="14" fill="#fff" font-weight="700" text-anchor="middle">A</text>
  <text x="64" y="34" font-size="15" fill="#111" font-weight="600">AnimeVault</text>

  <!-- ==================== SIDEBAR ==================== -->
  <rect x="0" y="56" width="64" height="844" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="8" y="308" width="48" height="44" rx="8" fill="#eef2ff"/>
  <text x="32" y="340" class="small" text-anchor="middle" fill="#6366f1">Backup</text>

  <!-- ==================== MAIN CONTENT (centered, max-width) ==================== -->
  <rect x="64" y="56" width="1376" height="844" fill="#fafafa"/>

  <!-- Page title -->
  <text x="340" y="100" class="heading">Backup and Restore</text>
  <text x="340" y="120" class="body">Protect your collection data and image tags</text>

  <!-- ==================== CREATE BACKUP CARD ==================== -->
  <rect x="340" y="140" width="760" height="200" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>

  <text x="372" y="172" class="subheading">Create Backup</text>

  <!-- Options row -->
  <rect x="372" y="188" width="16" height="16" rx="3" fill="#fff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="396" y="200" class="body">Include images (larger backup file)</text>

  <!-- Target directory -->
  <text x="372" y="232" class="body" fill="#888">Target directory:</text>
  <rect x="372" y="240" width="400" height="28" rx="6" fill="#f3f4f6"/>
  <text x="388" y="258" class="body" fill="#888">(default location)</text>
  <rect x="780" y="240" width="64" height="28" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="812" y="258" font-size="10" fill="#555" text-anchor="middle">Browse</text>

  <!-- Backup button -->
  <rect x="372" y="288" width="120" height="32" rx="6" fill="#6366f1"/>
  <text x="432" y="308" font-size="11" fill="#fff" text-anchor="middle">Create Backup</text>

  <!-- Last backup info -->
  <text x="508" y="308" class="small" fill="#888">Last backup: April 12, 2026 at 2:30 PM</text>

  <!-- ==================== BACKUP HISTORY TABLE ==================== -->
  <rect x="340" y="360" width="760" height="340" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>

  <text x="372" y="392" class="subheading">Backup History</text>
  <text x="372" y="410" class="body" fill="#888">5 backups stored</text>

  <!-- Table header -->
  <rect x="356" y="420" width="728" height="32" rx="0" fill="#f8fafc"/>
  <text x="372" y="440" font-size="11" fill="#888" font-weight="500">Date</text>
  <text x="600" y="440" font-size="11" fill="#888" font-weight="500">Includes Images</text>
  <text x="760" y="440" font-size="11" fill="#888" font-weight="500">Size</text>
  <text x="880" y="440" font-size="11" fill="#888" font-weight="500">Actions</text>

  <!-- Row 1 -->
  <line x1="356" y1="452" x2="1084" y2="452" stroke="#f3f4f6" stroke-width="1"/>
  <text x="372" y="472" class="body">Apr 12, 2026 2:30 PM</text>
  <text x="600" y="472" class="body">Yes</text>
  <text x="760" y="472" class="body">2.4 GB</text>
  <rect x="880" y="458" width="64" height="24" rx="4" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
  <text x="912" y="474" font-size="10" fill="#f59e0b" text-anchor="middle">Restore</text>
  <rect x="952" y="458" width="56" height="24" rx="4" fill="#fff" stroke="#fecaca" stroke-width="1"/>
  <text x="980" y="474" font-size="10" fill="#dc2626" text-anchor="middle">Delete</text>

  <!-- Row 2 -->
  <line x1="356" y1="488" x2="1084" y2="488" stroke="#f3f4f6" stroke-width="1"/>
  <text x="372" y="508" class="body">Apr 11, 2026 11:00 AM</text>
  <text x="600" y="508" class="body">No</text>
  <text x="760" y="508" class="body">12 MB</text>
  <rect x="880" y="494" width="64" height="24" rx="4" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
  <text x="912" y="510" font-size="10" fill="#f59e0b" text-anchor="middle">Restore</text>
  <rect x="952" y="494" width="56" height="24" rx="4" fill="#fff" stroke="#fecaca" stroke-width="1"/>
  <text x="980" y="510" font-size="10" fill="#dc2626" text-anchor="middle">Delete</text>

  <!-- Row 3 -->
  <line x1="356" y1="524" x2="1084" y2="524" stroke="#f3f4f6" stroke-width="1"/>
  <text x="372" y="544" class="body">Apr 10, 2026 3:15 PM</text>
  <text x="600" y="544" class="body">Yes</text>
  <text x="760" y="544" class="body">2.3 GB</text>
  <rect x="880" y="530" width="64" height="24" rx="4" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
  <text x="912" y="546" font-size="10" fill="#f59e0b" text-anchor="middle">Restore</text>
  <rect x="952" y="530" width="56" height="24" rx="4" fill="#fff" stroke="#fecaca" stroke-width="1"/>
  <text x="980" y="546" font-size="10" fill="#dc2626" text-anchor="middle">Delete</text>

  <!-- Row 4 (idle backup indicator) -->
  <line x1="356" y1="560" x2="1084" y2="560" stroke="#f3f4f6" stroke-width="1"/>
  <text x="372" y="580" class="body">Apr 9, 2026 9:00 PM</text>
  <rect x="522" y="568" width="52" height="18" rx="9" fill="#f0fdf4"/>
  <text x="548" y="580" font-size="9" fill="#16a34a" text-anchor="middle">auto</text>
  <text x="600" y="580" class="body">No</text>
  <text x="760" y="580" class="body">11 MB</text>
  <rect x="880" y="566" width="64" height="24" rx="4" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
  <text x="912" y="582" font-size="10" fill="#f59e0b" text-anchor="middle">Restore</text>
  <rect x="952" y="566" width="56" height="24" rx="4" fill="#fff" stroke="#fecaca" stroke-width="1"/>
  <text x="980" y="582" font-size="10" fill="#dc2626" text-anchor="middle">Delete</text>

  <!-- ==================== IDLE BACKUP SETTINGS ==================== -->
  <rect x="340" y="720" width="760" height="140" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>

  <text x="372" y="752" class="subheading">Auto-Backup Settings</text>

  <!-- Toggle -->
  <rect x="372" y="764" width="40" height="22" rx="11" fill="#6366f1"/>
  <circle cx="402" cy="775" r="9" fill="#fff"/>
  <text x="420" y="778" class="body">Enable idle backup</text>

  <!-- Settings row -->
  <text x="372" y="808" class="body" fill="#888">Backup after</text>
  <rect x="452" y="794" width="48" height="24" rx="4" fill="#f3f4f6"/>
  <text x="476" y="810" class="body" text-anchor="middle">30</text>
  <text x="508" y="808" class="body" fill="#888">minutes idle</text>

  <rect x="596" y="794" width="16" height="16" rx="3" fill="#fff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="620" y="808" class="body">Include images</text>

  <text x="732" y="808" class="body" fill="#888">Keep last</text>
  <rect x="792" y="794" width="36" height="24" rx="4" fill="#f3f4f6"/>
  <text x="810" y="810" class="body" text-anchor="middle">5</text>
  <text x="836" y="808" class="body" fill="#888">backups</text>

  <rect x="900" y="794" width="60" height="24" rx="6" fill="#6366f1"/>
  <text x="930" y="810" font-size="10" fill="#fff" text-anchor="middle">Save</text>

  <!-- Annotation -->
  <text x="720" y="890" class="label" text-anchor="middle">Centered card layout -- same structure works on mobile as single column</text>
</svg>
