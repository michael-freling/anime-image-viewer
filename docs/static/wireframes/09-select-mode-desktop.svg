<svg viewBox="0 0 3840 2160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
      .label { font-size: 22px; fill: #888; }
      .heading { font-size: 36px; fill: #f1f5f9; font-weight: 700; }
      .body { font-size: 24px; fill: #94a3b8; }
      .small { font-size: 20px; fill: #64748b; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="3840" height="2160" fill="#0f0f14"/>

  <!-- Icon rail -->
  <rect x="0" y="0" width="80" height="2160" fill="#16161e"/>
  <rect x="16" y="20" width="48" height="48" rx="12" fill="#818cf8"/>
  <text x="40" y="52" font-size="28" fill="#fff" font-weight="700" text-anchor="middle">A</text>

  <!-- ==================== SELECTION ACTION BAR (replaces normal toolbar) ==================== -->
  <rect x="80" y="0" width="3760" height="80" fill="#312e81"/>

  <!-- Selected count -->
  <text x="160" y="50" font-size="28" fill="#f1f5f9" font-weight="600">5 selected</text>

  <!-- Selection actions -->
  <rect x="400" y="18" width="140" height="44" rx="10" fill="rgba(255,255,255,0.15)"/>
  <text x="470" y="48" font-size="20" fill="#f1f5f9" text-anchor="middle">Select All</text>

  <rect x="560" y="18" width="100" height="44" rx="10" fill="rgba(255,255,255,0.15)"/>
  <text x="610" y="48" font-size="20" fill="#f1f5f9" text-anchor="middle">Clear</text>

  <!-- Actions -->
  <rect x="2800" y="18" width="180" height="44" rx="10" fill="#818cf8"/>
  <text x="2890" y="48" font-size="22" fill="#fff" text-anchor="middle" font-weight="500">Edit Tags</text>

  <!-- Done button -->
  <rect x="3520" y="18" width="120" height="44" rx="10" fill="rgba(255,255,255,0.2)"/>
  <text x="3580" y="48" font-size="22" fill="#f1f5f9" text-anchor="middle">Done</text>

  <!-- ==================== IMAGE GRID WITH SELECT MODE ACTIVE ==================== -->
  <!-- Row 1 -->
  <!-- Image 1 (SELECTED) -->
  <g transform="translate(160, 100)">
    <rect width="480" height="320" rx="12" fill="#312e81" stroke="#818cf8" stroke-width="4"/>
    <!-- Selection overlay -->
    <rect width="480" height="320" rx="12" fill="#818cf8" opacity="0.15"/>
    <!-- Checkbox (checked) -->
    <rect x="16" y="16" width="36" height="36" rx="8" fill="#818cf8"/>
    <text x="34" y="42" font-size="22" fill="#fff" text-anchor="middle">V</text>
    <text x="240" y="168" font-size="24" fill="#818cf8" text-anchor="middle">Image 1 (selected)</text>
  </g>

  <!-- Image 2 (SELECTED) -->
  <g transform="translate(660, 100)">
    <rect width="480" height="400" rx="12" fill="#831843" stroke="#818cf8" stroke-width="4"/>
    <rect width="480" height="400" rx="12" fill="#818cf8" opacity="0.15"/>
    <rect x="16" y="16" width="36" height="36" rx="8" fill="#818cf8"/>
    <text x="34" y="42" font-size="22" fill="#fff" text-anchor="middle">V</text>
    <text x="240" y="208" font-size="24" fill="#f9a8d4" text-anchor="middle">Image 2 (selected)</text>
  </g>

  <!-- Image 3 (NOT selected) -->
  <g transform="translate(1160, 100)">
    <rect width="480" height="280" rx="12" fill="#14532d"/>
    <!-- Empty checkbox -->
    <rect x="16" y="16" width="36" height="36" rx="8" fill="#0a0a0f" opacity="0.5" stroke="#64748b" stroke-width="2"/>
    <text x="240" y="148" font-size="24" fill="#6ee7b7" text-anchor="middle">Image 3</text>
  </g>

  <!-- Image 4 (SELECTED) -->
  <g transform="translate(1660, 100)">
    <rect width="480" height="360" rx="12" fill="#713f12" stroke="#818cf8" stroke-width="4"/>
    <rect width="480" height="360" rx="12" fill="#818cf8" opacity="0.15"/>
    <rect x="16" y="16" width="36" height="36" rx="8" fill="#818cf8"/>
    <text x="34" y="42" font-size="22" fill="#fff" text-anchor="middle">V</text>
    <text x="240" y="188" font-size="24" fill="#fcd34d" text-anchor="middle">Image 4 (selected)</text>
  </g>

  <!-- Image 5 (NOT selected) -->
  <g transform="translate(2160, 100)">
    <rect width="480" height="320" rx="12" fill="#3b0764"/>
    <rect x="16" y="16" width="36" height="36" rx="8" fill="#0a0a0f" opacity="0.5" stroke="#64748b" stroke-width="2"/>
    <text x="240" y="168" font-size="24" fill="#c4b5fd" text-anchor="middle">Image 5</text>
  </g>

  <!-- Image 6 (INSIDE RUBBER BAND - being selected) -->
  <g transform="translate(2660, 100)">
    <rect width="480" height="380" rx="12" fill="#1c1917" stroke="#818cf8" stroke-width="3" stroke-dasharray="8"/>
    <rect width="480" height="380" rx="12" fill="#818cf8" opacity="0.1"/>
    <rect x="16" y="16" width="36" height="36" rx="8" fill="#818cf8" opacity="0.6"/>
    <text x="240" y="198" font-size="24" fill="#a8a29e" text-anchor="middle">Image 6 (lasso)</text>
  </g>

  <!-- Image 7 (INSIDE RUBBER BAND - being selected) -->
  <g transform="translate(3160, 100)">
    <rect width="480" height="300" rx="12" fill="#881337" stroke="#818cf8" stroke-width="3" stroke-dasharray="8"/>
    <rect width="480" height="300" rx="12" fill="#818cf8" opacity="0.1"/>
    <rect x="16" y="16" width="36" height="36" rx="8" fill="#818cf8" opacity="0.6"/>
    <text x="240" y="158" font-size="24" fill="#fb7185" text-anchor="middle">Image 7 (lasso)</text>
  </g>

  <!-- ==================== RUBBER BAND RECTANGLE ==================== -->
  <!-- This represents the rubber band selection area the user is dragging -->
  <rect x="2600" y="60" width="1100" height="460" rx="4" fill="#818cf8" opacity="0.08" stroke="#818cf8" stroke-width="2" stroke-dasharray="8 4"/>

  <!-- Mouse cursor at drag end point -->
  <g transform="translate(3680, 500)">
    <!-- Cursor arrow shape -->
    <polygon points="0,0 0,24 6,18 12,30 16,28 10,16 18,14" fill="#f1f5f9" stroke="#0a0a0f" stroke-width="1"/>
  </g>

  <!-- Row 2 -->
  <g transform="translate(160, 440)">
    <rect width="480" height="360" rx="12" fill="#134e4a"/>
    <rect x="16" y="16" width="36" height="36" rx="8" fill="#0a0a0f" opacity="0.5" stroke="#64748b" stroke-width="2"/>
    <text x="240" y="188" font-size="24" fill="#5eead4" text-anchor="middle">Image 8</text>
  </g>

  <!-- Image 9 (SELECTED via shift+click range) -->
  <g transform="translate(660, 520)">
    <rect width="480" height="280" rx="12" fill="#7f1d1d" stroke="#818cf8" stroke-width="4"/>
    <rect width="480" height="280" rx="12" fill="#818cf8" opacity="0.15"/>
    <rect x="16" y="16" width="36" height="36" rx="8" fill="#818cf8"/>
    <text x="34" y="42" font-size="22" fill="#fff" text-anchor="middle">V</text>
    <text x="240" y="148" font-size="24" fill="#fca5a5" text-anchor="middle">Image 9 (selected)</text>
  </g>

  <g transform="translate(1160, 400)">
    <rect width="480" height="400" rx="12" fill="#1e3a5f"/>
    <rect x="16" y="16" width="36" height="36" rx="8" fill="#0a0a0f" opacity="0.5" stroke="#64748b" stroke-width="2"/>
    <text x="240" y="208" font-size="24" fill="#7dd3fc" text-anchor="middle">Image 10</text>
  </g>

  <g transform="translate(1660, 480)">
    <rect width="480" height="320" rx="12" fill="#4a1d96"/>
    <rect x="16" y="16" width="36" height="36" rx="8" fill="#0a0a0f" opacity="0.5" stroke="#64748b" stroke-width="2"/>
    <text x="240" y="168" font-size="24" fill="#a78bfa" text-anchor="middle">Image 11</text>
  </g>

  <!-- INSIDE RUBBER BAND - row 2 -->
  <g transform="translate(2660, 500)">
    <rect width="480" height="300" rx="12" fill="#312e81" stroke="#818cf8" stroke-width="3" stroke-dasharray="8"/>
    <rect width="480" height="300" rx="12" fill="#818cf8" opacity="0.1"/>
    <rect x="16" y="16" width="36" height="36" rx="8" fill="#818cf8" opacity="0.6"/>
    <text x="240" y="158" font-size="24" fill="#818cf8" text-anchor="middle">Image 13 (lasso)</text>
  </g>

  <!-- ==================== HELP TOOLTIP (bottom) ==================== -->
  <rect x="1320" y="2020" width="1200" height="80" rx="16" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
  <text x="1360" y="2060" font-size="22" fill="#64748b">Click: toggle</text>
  <text x="1640" y="2060" font-size="22" fill="#475569">|</text>
  <text x="1700" y="2060" font-size="22" fill="#64748b">Shift+Click: range</text>
  <text x="2040" y="2060" font-size="22" fill="#475569">|</text>
  <text x="2100" y="2060" font-size="22" fill="#64748b">Ctrl+Click: add/remove</text>
  <text x="2480" y="2060" font-size="22" fill="#475569">|</text>
  <text x="2540" y="2060" font-size="22" fill="#818cf8" font-weight="500">Drag: rubber band select</text>

  <!-- Annotations -->
  <text x="1960" y="2130" class="label" text-anchor="middle">Select mode with RUBBER BAND (lasso) selection shown -- Dashed blue rect = drag area -- Selected images have indigo border + tint</text>
  <text x="1960" y="2160" class="label" text-anchor="middle">Mouse interactions: Click toggle, Shift+click range, Ctrl+click add/remove, Drag on empty space for rubber band</text>
</svg>
