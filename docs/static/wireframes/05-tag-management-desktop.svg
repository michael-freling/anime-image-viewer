<svg viewBox="0 0 3840 2160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
      .label { font-size: 22px; fill: #888; }
      .heading { font-size: 44px; fill: #f1f5f9; font-weight: 700; }
      .subheading { font-size: 28px; fill: #f1f5f9; font-weight: 500; }
      .body { font-size: 24px; fill: #94a3b8; }
      .small { font-size: 20px; fill: #64748b; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="3840" height="2160" fill="#0f0f14"/>

  <!-- Icon rail -->
  <rect x="0" y="0" width="80" height="2160" fill="#16161e"/>
  <rect x="16" y="20" width="48" height="48" rx="12" fill="#818cf8"/>
  <text x="40" y="52" font-size="28" fill="#fff" font-weight="700" text-anchor="middle">A</text>
  <!-- Tags (active) -->
  <g transform="translate(0, 320)">
    <rect x="8" y="0" width="64" height="64" rx="12" fill="#1e1e2e"/>
    <text x="40" y="84" font-size="18" fill="#818cf8" text-anchor="middle" font-weight="500">Tags</text>
  </g>

  <!-- ==================== HEADER ==================== -->
  <rect x="80" y="0" width="3760" height="120" fill="#16161e"/>
  <text x="160" y="60" class="heading" font-size="40">Tags</text>
  <text x="160" y="96" class="body">47 tags across 5 categories</text>

  <!-- Search and create -->
  <rect x="1400" y="28" width="600" height="52" rx="26" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
  <text x="1440" y="62" font-size="22" fill="#475569">Search tags...</text>

  <rect x="3440" y="28" width="200" height="52" rx="12" fill="#818cf8"/>
  <text x="3540" y="62" font-size="24" fill="#fff" text-anchor="middle" font-weight="500">+ New Tag</text>

  <!-- ==================== TAG CARDS LAYOUT (card grid, NOT tree + panel) ==================== -->
  <!-- Category: Characters -->
  <text x="160" y="176" font-size="32" fill="#f1f5f9" font-weight="600">Characters</text>
  <text x="490" y="176" font-size="22" fill="#64748b">18 tags</text>

  <!-- Tag cards (large, with preview images) -->
  <g transform="translate(160, 200)">
    <rect width="560" height="200" rx="16" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
    <!-- Preview images (horizontal strip at top) -->
    <rect x="0" y="0" width="140" height="100" rx="16" fill="#312e81"/>
    <rect x="140" y="0" width="140" height="100" fill="#831843"/>
    <rect x="280" y="0" width="140" height="100" fill="#14532d"/>
    <rect x="420" y="0" width="140" height="100" rx="16" fill="#713f12"/>
    <rect x="420" y="0" width="140" height="100" rx="0" fill="#713f12"/>
    <rect x="416" y="0" width="4" height="100" fill="#713f12"/>
    <!-- Tag info -->
    <text x="20" y="136" font-size="26" fill="#f1f5f9" font-weight="500">Eren</text>
    <text x="20" y="166" font-size="20" fill="#64748b">86 images -- 3 anime</text>
    <!-- Actions -->
    <rect x="440" y="120" width="96" height="36" rx="8" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
    <text x="488" y="144" font-size="18" fill="#94a3b8" text-anchor="middle">Edit</text>
    <rect x="440" y="160" width="96" height="28" rx="8" fill="transparent"/>
    <text x="488" y="180" font-size="16" fill="#64748b" text-anchor="middle">...</text>
  </g>

  <g transform="translate(750, 200)">
    <rect width="560" height="200" rx="16" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
    <rect x="0" y="0" width="140" height="100" rx="16" fill="#831843"/>
    <rect x="140" y="0" width="140" height="100" fill="#3b0764"/>
    <rect x="280" y="0" width="140" height="100" fill="#312e81"/>
    <rect x="420" y="0" width="140" height="100" rx="16" fill="#1c1917"/>
    <text x="20" y="136" font-size="26" fill="#f1f5f9" font-weight="500">Mikasa</text>
    <text x="20" y="166" font-size="20" fill="#64748b">72 images -- 2 anime</text>
    <rect x="440" y="120" width="96" height="36" rx="8" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
    <text x="488" y="144" font-size="18" fill="#94a3b8" text-anchor="middle">Edit</text>
  </g>

  <g transform="translate(1340, 200)">
    <rect width="560" height="200" rx="16" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
    <rect x="0" y="0" width="140" height="100" rx="16" fill="#14532d"/>
    <rect x="140" y="0" width="140" height="100" fill="#713f12"/>
    <rect x="280" y="0" width="140" height="100" fill="#881337"/>
    <rect x="420" y="0" width="140" height="100" rx="16" fill="#134e4a"/>
    <text x="20" y="136" font-size="26" fill="#f1f5f9" font-weight="500">Armin</text>
    <text x="20" y="166" font-size="20" fill="#64748b">54 images -- 1 anime</text>
    <rect x="440" y="120" width="96" height="36" rx="8" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
    <text x="488" y="144" font-size="18" fill="#94a3b8" text-anchor="middle">Edit</text>
  </g>

  <g transform="translate(1930, 200)">
    <rect width="560" height="200" rx="16" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
    <rect x="0" y="0" width="140" height="100" rx="16" fill="#4a1d96"/>
    <rect x="140" y="0" width="140" height="100" fill="#7f1d1d"/>
    <rect x="280" y="0" width="280" height="100" rx="16" fill="#1e3a5f"/>
    <text x="20" y="136" font-size="26" fill="#f1f5f9" font-weight="500">Levi</text>
    <text x="20" y="166" font-size="20" fill="#64748b">48 images -- 1 anime</text>
    <rect x="440" y="120" width="96" height="36" rx="8" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
    <text x="488" y="144" font-size="18" fill="#94a3b8" text-anchor="middle">Edit</text>
  </g>

  <g transform="translate(2520, 200)">
    <rect width="560" height="200" rx="16" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
    <rect x="0" y="0" width="280" height="100" rx="16" fill="#365314"/>
    <rect x="280" y="0" width="280" height="100" rx="16" fill="#78350f"/>
    <text x="20" y="136" font-size="26" fill="#f1f5f9" font-weight="500">Historia</text>
    <text x="20" y="166" font-size="20" fill="#64748b">32 images -- 1 anime</text>
    <rect x="440" y="120" width="96" height="36" rx="8" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
    <text x="488" y="144" font-size="18" fill="#94a3b8" text-anchor="middle">Edit</text>
  </g>

  <g transform="translate(3110, 200)">
    <rect width="560" height="200" rx="16" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
    <rect x="0" y="0" width="560" height="100" rx="16" fill="#2d2d3f"/>
    <text x="280" y="58" font-size="22" fill="#475569" text-anchor="middle">+3 more characters...</text>
    <text x="20" y="136" font-size="26" fill="#f1f5f9" font-weight="500">Hange, Sasha, Erwin</text>
    <text x="20" y="166" font-size="20" fill="#64748b">Combined: 67 images</text>
  </g>

  <!-- Category: Scenes -->
  <text x="160" y="470" font-size="32" fill="#f1f5f9" font-weight="600">Scenes</text>
  <text x="360" y="470" font-size="22" fill="#64748b">12 tags</text>

  <g transform="translate(160, 494)">
    <rect width="560" height="200" rx="16" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
    <rect x="0" y="0" width="560" height="100" rx="16" fill="#14532d"/>
    <text x="20" y="136" font-size="26" fill="#f1f5f9" font-weight="500">Outdoor</text>
    <text x="20" y="166" font-size="20" fill="#64748b">124 images -- 8 anime</text>
  </g>

  <g transform="translate(750, 494)">
    <rect width="560" height="200" rx="16" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
    <rect x="0" y="0" width="560" height="100" rx="16" fill="#312e81"/>
    <text x="20" y="136" font-size="26" fill="#f1f5f9" font-weight="500">Indoor</text>
    <text x="20" y="166" font-size="20" fill="#64748b">98 images -- 7 anime</text>
  </g>

  <g transform="translate(1340, 494)">
    <rect width="560" height="200" rx="16" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
    <rect x="0" y="0" width="560" height="100" rx="16" fill="#831843"/>
    <text x="20" y="136" font-size="26" fill="#f1f5f9" font-weight="500">Action</text>
    <text x="20" y="166" font-size="20" fill="#64748b">156 images -- 10 anime</text>
  </g>

  <g transform="translate(1930, 494)">
    <rect width="560" height="200" rx="16" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
    <rect x="0" y="0" width="560" height="100" rx="16" fill="#713f12"/>
    <text x="20" y="136" font-size="26" fill="#f1f5f9" font-weight="500">Romance</text>
    <text x="20" y="166" font-size="20" fill="#64748b">42 images -- 4 anime</text>
  </g>

  <!-- Category: Locations -->
  <text x="160" y="764" font-size="32" fill="#f1f5f9" font-weight="600">Locations</text>
  <text x="420" y="764" font-size="22" fill="#64748b">8 tags</text>

  <g transform="translate(160, 788)">
    <rect width="560" height="200" rx="16" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
    <rect x="0" y="0" width="560" height="100" rx="16" fill="#1e3a5f"/>
    <text x="20" y="136" font-size="26" fill="#f1f5f9" font-weight="500">School</text>
    <text x="20" y="166" font-size="20" fill="#64748b">89 images -- 6 anime</text>
  </g>

  <g transform="translate(750, 788)">
    <rect width="560" height="200" rx="16" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
    <rect x="0" y="0" width="560" height="100" rx="16" fill="#4a1d96"/>
    <text x="20" y="136" font-size="26" fill="#f1f5f9" font-weight="500">City</text>
    <text x="20" y="166" font-size="20" fill="#64748b">67 images -- 5 anime</text>
  </g>

  <!-- Annotations -->
  <text x="1960" y="2100" class="label" text-anchor="middle">Visual tag cards with preview images -- Grouped by category -- NOT a tree + detail panel split</text>
  <text x="1960" y="2140" class="label" text-anchor="middle">Inspired by Pinterest boards / Google Photos albums -- Each tag card shows preview images</text>
</svg>
