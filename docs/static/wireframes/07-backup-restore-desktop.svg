<svg viewBox="0 0 3840 2160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
      .label { font-size: 22px; fill: #888; }
      .heading { font-size: 44px; fill: #f1f5f9; font-weight: 700; }
      .body { font-size: 24px; fill: #94a3b8; }
      .small { font-size: 20px; fill: #64748b; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="3840" height="2160" fill="#0f0f14"/>

  <!-- Icon rail -->
  <rect x="0" y="0" width="80" height="2160" fill="#16161e"/>
  <rect x="16" y="20" width="48" height="48" rx="12" fill="#818cf8"/>
  <text x="40" y="52" font-size="28" fill="#fff" font-weight="700" text-anchor="middle">A</text>
  <!-- Backup active -->
  <g transform="translate(0, 460)">
    <rect x="8" y="0" width="64" height="64" rx="12" fill="#1e1e2e"/>
    <text x="40" y="84" font-size="18" fill="#818cf8" text-anchor="middle" font-weight="500">Backup</text>
  </g>

  <!-- ==================== CENTERED CONTENT (max-width 1200px) ==================== -->
  <text x="1520" y="100" class="heading" font-size="40" text-anchor="middle">Backup and Restore</text>
  <text x="1520" y="140" class="body" text-anchor="middle">Protect your collection with regular backups</text>

  <!-- Create Backup card -->
  <rect x="920" y="180" width="1200" height="320" rx="20" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
  <text x="972" y="228" font-size="28" fill="#f1f5f9" font-weight="600">Create Backup</text>

  <!-- Include images toggle -->
  <text x="972" y="280" font-size="22" fill="#94a3b8">Include images</text>
  <rect x="1760" y="258" width="56" height="32" rx="16" fill="#818cf8"/>
  <circle cx="1800" cy="274" r="12" fill="#fff"/>

  <!-- Target directory -->
  <text x="972" y="332" font-size="22" fill="#94a3b8">Target directory</text>
  <rect x="972" y="346" width="800" height="48" rx="10" fill="#0f0f14" stroke="#2d2d3f" stroke-width="1"/>
  <text x="992" y="378" font-size="20" fill="#64748b">/home/user/backups/</text>
  <rect x="1784" y="346" width="120" height="48" rx="10" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
  <text x="1844" y="378" font-size="20" fill="#94a3b8" text-anchor="middle">Browse</text>

  <!-- Create button -->
  <rect x="972" y="420" width="240" height="52" rx="12" fill="#818cf8"/>
  <text x="1092" y="454" font-size="24" fill="#fff" text-anchor="middle" font-weight="500">Create Backup</text>

  <!-- Backup History -->
  <rect x="920" y="540" width="1200" height="600" rx="20" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
  <text x="972" y="588" font-size="28" fill="#f1f5f9" font-weight="600">Backup History</text>

  <!-- Table header -->
  <rect x="940" y="610" width="1160" height="44" rx="0" fill="#16161e"/>
  <text x="972" y="640" font-size="20" fill="#64748b" font-weight="500">Date</text>
  <text x="1360" y="640" font-size="20" fill="#64748b" font-weight="500">Images</text>
  <text x="1560" y="640" font-size="20" fill="#64748b" font-weight="500">Size</text>
  <text x="1760" y="640" font-size="20" fill="#64748b" font-weight="500">Type</text>
  <text x="2060" y="640" font-size="20" fill="#64748b" font-weight="500" text-anchor="end">Actions</text>

  <!-- Row 1 -->
  <rect x="940" y="654" width="1160" height="56" fill="transparent"/>
  <line x1="940" y1="710" x2="2100" y2="710" stroke="#2d2d3f" stroke-width="1"/>
  <text x="972" y="690" font-size="22" fill="#f1f5f9">Apr 12, 2026 -- 10:30 AM</text>
  <text x="1360" y="690" font-size="22" fill="#94a3b8">Yes</text>
  <text x="1560" y="690" font-size="22" fill="#94a3b8">2.4 GB</text>
  <rect x="1740" y="672" width="72" height="28" rx="14" fill="#1a3a2e"/>
  <text x="1776" y="692" font-size="16" fill="#6ee7b7" text-anchor="middle">auto</text>
  <text x="1940" y="690" font-size="20" fill="#818cf8">Restore</text>
  <text x="2060" y="690" font-size="20" fill="#fca5a5" text-anchor="end">Delete</text>

  <!-- Row 2 -->
  <rect x="940" y="710" width="1160" height="56" fill="transparent"/>
  <line x1="940" y1="766" x2="2100" y2="766" stroke="#2d2d3f" stroke-width="1"/>
  <text x="972" y="746" font-size="22" fill="#f1f5f9">Apr 11, 2026 -- 2:15 PM</text>
  <text x="1360" y="746" font-size="22" fill="#94a3b8">No</text>
  <text x="1560" y="746" font-size="22" fill="#94a3b8">48 MB</text>
  <rect x="1740" y="728" width="92" height="28" rx="14" fill="#312e81"/>
  <text x="1786" y="748" font-size="16" fill="#818cf8" text-anchor="middle">manual</text>
  <text x="1940" y="746" font-size="20" fill="#818cf8">Restore</text>
  <text x="2060" y="746" font-size="20" fill="#fca5a5" text-anchor="end">Delete</text>

  <!-- Row 3 -->
  <rect x="940" y="766" width="1160" height="56" fill="transparent"/>
  <text x="972" y="802" font-size="22" fill="#f1f5f9">Apr 10, 2026 -- 10:30 AM</text>
  <text x="1360" y="802" font-size="22" fill="#94a3b8">Yes</text>
  <text x="1560" y="802" font-size="22" fill="#94a3b8">2.3 GB</text>
  <rect x="1740" y="784" width="72" height="28" rx="14" fill="#1a3a2e"/>
  <text x="1776" y="804" font-size="16" fill="#6ee7b7" text-anchor="middle">auto</text>
  <text x="1940" y="802" font-size="20" fill="#818cf8">Restore</text>
  <text x="2060" y="802" font-size="20" fill="#fca5a5" text-anchor="end">Delete</text>

  <!-- Auto-Backup Settings -->
  <rect x="920" y="1180" width="1200" height="400" rx="20" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
  <text x="972" y="1228" font-size="28" fill="#f1f5f9" font-weight="600">Auto-Backup Settings</text>

  <!-- Enable toggle -->
  <text x="972" y="1284" font-size="22" fill="#94a3b8">Enable auto-backup</text>
  <rect x="1760" y="1262" width="56" height="32" rx="16" fill="#818cf8"/>
  <circle cx="1800" cy="1278" r="12" fill="#fff"/>

  <!-- Idle minutes -->
  <text x="972" y="1336" font-size="22" fill="#94a3b8">Backup after idle (minutes)</text>
  <rect x="1660" y="1314" width="160" height="44" rx="10" fill="#0f0f14" stroke="#2d2d3f" stroke-width="1"/>
  <text x="1740" y="1344" font-size="22" fill="#f1f5f9" text-anchor="middle">30</text>

  <!-- Retention count -->
  <text x="972" y="1392" font-size="22" fill="#94a3b8">Keep last N backups</text>
  <rect x="1660" y="1370" width="160" height="44" rx="10" fill="#0f0f14" stroke="#2d2d3f" stroke-width="1"/>
  <text x="1740" y="1400" font-size="22" fill="#f1f5f9" text-anchor="middle">5</text>

  <!-- Include images -->
  <text x="972" y="1448" font-size="22" fill="#94a3b8">Include images in auto-backups</text>
  <rect x="1760" y="1426" width="56" height="32" rx="16" fill="#2d2d3f"/>
  <circle cx="1780" cy="1442" r="12" fill="#64748b"/>

  <!-- Save -->
  <rect x="972" y="1500" width="160" height="48" rx="12" fill="#818cf8"/>
  <text x="1052" y="1532" font-size="22" fill="#fff" text-anchor="middle">Save</text>

  <!-- Annotations -->
  <text x="1520" y="2140" class="label" text-anchor="middle">Centered card layout (max-width 1200px) -- Create, History, Auto-backup settings</text>
</svg>
