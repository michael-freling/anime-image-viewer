<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
      .label { font-size: 11px; fill: #888; }
      .heading { font-size: 18px; fill: #111; font-weight: 600; }
      .subheading { font-size: 14px; fill: #111; font-weight: 500; }
      .body { font-size: 12px; fill: #555; }
      .small { font-size: 10px; fill: #999; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="#fafafa"/>

  <!-- ==================== TOP BAR ==================== -->
  <rect x="0" y="0" width="1440" height="56" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="24" y="14" width="28" height="28" rx="6" fill="#6366f1"/>
  <text x="40" y="33" font-size="14" fill="#fff" font-weight="700" text-anchor="middle">A</text>
  <text x="64" y="34" font-size="15" fill="#111" font-weight="600">AnimeVault</text>

  <!-- FOCUSED Search Bar (expanded) -->
  <rect x="300" y="10" width="840" height="36" rx="8" fill="#fff" stroke="#6366f1" stroke-width="2"/>
  <text x="320" y="34" class="body" fill="#111">mikasa outdoor</text>
  <!-- Cursor blink -->
  <line x1="412" y1="18" x2="412" y2="38" stroke="#6366f1" stroke-width="1.5"/>
  <!-- Clear button -->
  <rect x="1100" y="18" width="20" height="20" rx="10" fill="#f3f4f6"/>
  <text x="1110" y="32" font-size="12" fill="#888" text-anchor="middle">x</text>

  <!-- Right controls -->
  <circle cx="1360" cy="28" r="14" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
  <circle cx="1400" cy="28" r="14" fill="none" stroke="#d1d5db" stroke-width="1.5"/>

  <!-- ==================== SIDEBAR ==================== -->
  <rect x="0" y="56" width="64" height="844" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Search active -->
  <rect x="8" y="124" width="48" height="44" rx="8" fill="#eef2ff"/>
  <text x="32" y="156" class="small" text-anchor="middle" fill="#6366f1">Search</text>

  <!-- ==================== FILTER PANEL (left) ==================== -->
  <rect x="64" y="56" width="300" height="844" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Active Filters -->
  <text x="84" y="84" font-size="11" fill="#888" font-weight="500" letter-spacing="1">ACTIVE FILTERS</text>

  <!-- Filter chips with remove buttons -->
  <rect x="84" y="94" width="120" height="26" rx="13" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="94" y="111" font-size="10" fill="#6366f1">Anime: All</text>
  <text x="192" y="111" font-size="10" fill="#6366f1">x</text>

  <rect x="212" y="94" width="140" height="26" rx="13" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="222" y="111" font-size="10" fill="#6366f1">Tag: Outdoor</text>
  <text x="340" y="111" font-size="10" fill="#6366f1">x</text>

  <text x="322" y="84" font-size="10" fill="#888" text-anchor="end">Clear all</text>

  <line x1="84" y1="132" x2="344" y2="132" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ANIME FILTER -->
  <text x="84" y="156" font-size="12" fill="#111" font-weight="500">Anime</text>
  <text x="344" y="156" font-size="12" fill="#888" text-anchor="end">&#9660;</text>

  <rect x="84" y="164" width="260" height="28" rx="6" fill="#f3f4f6"/>
  <text x="96" y="182" class="body" fill="#888">All anime</text>
  <!-- Dropdown is expanded in this wireframe -->

  <line x1="84" y1="204" x2="344" y2="204" stroke="#e5e7eb" stroke-width="1"/>

  <!-- FOLDER FILTER (tree) -->
  <text x="84" y="228" font-size="12" fill="#111" font-weight="500">Folder</text>
  <text x="344" y="228" font-size="12" fill="#888" text-anchor="end">&#9660;</text>

  <text x="100" y="252" class="body">&#128193; attack-on-titan</text>
  <text x="120" y="272" class="small" fill="#555">&#128193; season-1</text>
  <text x="120" y="292" class="small" fill="#555">&#128193; season-2</text>
  <text x="100" y="312" class="body">&#128193; spy-x-family</text>
  <text x="100" y="332" class="body">&#128193; jujutsu-kaisen</text>

  <line x1="84" y1="352" x2="344" y2="352" stroke="#e5e7eb" stroke-width="1"/>

  <!-- TAG FILTER (tree) -->
  <text x="84" y="376" font-size="12" fill="#111" font-weight="500">Tags</text>
  <text x="344" y="376" font-size="12" fill="#888" text-anchor="end">&#9660;</text>

  <!-- Tag toggle: Include / Exclude -->
  <rect x="84" y="384" width="80" height="24" rx="12" fill="#6366f1"/>
  <text x="124" y="400" font-size="10" fill="#fff" text-anchor="middle">Include</text>
  <rect x="168" y="384" width="80" height="24" rx="12" fill="#f3f4f6"/>
  <text x="208" y="400" font-size="10" fill="#555" text-anchor="middle">Exclude</text>

  <!-- Selected tag highlighted -->
  <rect x="84" y="416" width="260" height="28" rx="6" fill="#f3f4f6"/>
  <text x="96" y="434" class="body" fill="#888">Search tags...</text>

  <text x="100" y="460" class="body">&#9656; Characters</text>
  <text x="100" y="480" class="body" fill="#6366f1">&#9724; Outdoor</text>
  <text x="100" y="500" class="body">&#9656; Scenes</text>
  <text x="100" y="520" class="body">&#9656; Locations</text>

  <line x1="84" y1="544" x2="344" y2="544" stroke="#e5e7eb" stroke-width="1"/>

  <!-- SORT -->
  <text x="84" y="568" font-size="12" fill="#111" font-weight="500">Sort</text>
  <rect x="84" y="576" width="260" height="28" rx="6" fill="#f3f4f6"/>
  <text x="96" y="594" class="body">Date added (newest)</text>

  <!-- NAME FILTER -->
  <text x="84" y="624" font-size="12" fill="#111" font-weight="500">Filename</text>
  <rect x="84" y="632" width="260" height="28" rx="6" fill="#f3f4f6"/>
  <text x="96" y="650" class="body" fill="#888">Contains...</text>

  <!-- ==================== RESULTS AREA ==================== -->
  <rect x="364" y="56" width="1076" height="844" fill="#fafafa"/>

  <!-- Results header -->
  <rect x="364" y="56" width="1076" height="44" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="384" y="84" class="body" fill="#555">128 results for "mikasa outdoor"</text>

  <!-- Mode toggle -->
  <rect x="660" y="66" width="56" height="26" rx="4" fill="#6366f1"/>
  <text x="688" y="83" font-size="10" fill="#fff" text-anchor="middle">View</text>
  <rect x="716" y="66" width="56" height="26" rx="4" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="744" y="83" font-size="10" fill="#555" text-anchor="middle">Select</text>

  <!-- Grid size slider -->
  <text x="840" y="83" class="small">Grid:</text>
  <rect x="870" y="76" width="80" height="4" rx="2" fill="#e5e7eb"/>
  <rect x="870" y="76" width="48" height="4" rx="2" fill="#6366f1"/>
  <circle cx="918" cy="78" r="6" fill="#6366f1"/>

  <!-- ==================== SEARCH RESULTS GRID ==================== -->
  <!-- Row 1 -->
  <g transform="translate(384, 112)">
    <rect width="240" height="160" rx="8" fill="#e0e7ff"/>
    <text x="120" y="84" class="small" fill="#a5b4fc" text-anchor="middle">Result 1</text>
    <!-- Anime label overlay -->
    <rect x="8" y="132" width="100" height="20" rx="4" fill="#111" opacity="0.7"/>
    <text x="58" y="146" font-size="9" fill="#fff" text-anchor="middle">Attack on Titan</text>
  </g>
  <g transform="translate(636, 112)">
    <rect width="240" height="160" rx="8" fill="#fce7f3"/>
    <text x="120" y="84" class="small" fill="#f9a8d4" text-anchor="middle">Result 2</text>
    <rect x="8" y="132" width="100" height="20" rx="4" fill="#111" opacity="0.7"/>
    <text x="58" y="146" font-size="9" fill="#fff" text-anchor="middle">Attack on Titan</text>
  </g>
  <g transform="translate(888, 112)">
    <rect width="240" height="160" rx="8" fill="#d1fae5"/>
    <text x="120" y="84" class="small" fill="#6ee7b7" text-anchor="middle">Result 3</text>
    <rect x="8" y="132" width="80" height="20" rx="4" fill="#111" opacity="0.7"/>
    <text x="48" y="146" font-size="9" fill="#fff" text-anchor="middle">Spy x Family</text>
  </g>
  <g transform="translate(1140, 112)">
    <rect width="240" height="160" rx="8" fill="#fef3c7"/>
    <text x="120" y="84" class="small" fill="#fcd34d" text-anchor="middle">Result 4</text>
    <rect x="8" y="132" width="80" height="20" rx="4" fill="#111" opacity="0.7"/>
    <text x="48" y="146" font-size="9" fill="#fff" text-anchor="middle">Spy x Family</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(384, 284)">
    <rect width="240" height="160" rx="8" fill="#ddd6fe"/>
    <text x="120" y="84" class="small" fill="#c4b5fd" text-anchor="middle">Result 5</text>
  </g>
  <g transform="translate(636, 284)">
    <rect width="240" height="160" rx="8" fill="#fbcfe8"/>
    <text x="120" y="84" class="small" fill="#f9a8d4" text-anchor="middle">Result 6</text>
  </g>
  <g transform="translate(888, 284)">
    <rect width="240" height="160" rx="8" fill="#ccfbf1"/>
    <text x="120" y="84" class="small" fill="#5eead4" text-anchor="middle">Result 7</text>
  </g>
  <g transform="translate(1140, 284)">
    <rect width="240" height="160" rx="8" fill="#fee2e2"/>
    <text x="120" y="84" class="small" fill="#fca5a5" text-anchor="middle">Result 8</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(384, 456)">
    <rect width="240" height="160" rx="8" fill="#e0e7ff"/>
  </g>
  <g transform="translate(636, 456)">
    <rect width="240" height="160" rx="8" fill="#fef3c7"/>
  </g>
  <g transform="translate(888, 456)">
    <rect width="240" height="160" rx="8" fill="#d1fae5"/>
  </g>
  <g transform="translate(1140, 456)">
    <rect width="240" height="160" rx="8" fill="#ddd6fe"/>
  </g>

  <!-- Row 4 -->
  <g transform="translate(384, 628)">
    <rect width="240" height="160" rx="8" fill="#fce7f3"/>
  </g>
  <g transform="translate(636, 628)">
    <rect width="240" height="160" rx="8" fill="#ccfbf1"/>
  </g>
  <g transform="translate(888, 628)">
    <rect width="240" height="160" rx="8" fill="#fee2e2"/>
  </g>
  <g transform="translate(1140, 628)">
    <rect width="240" height="160" rx="8" fill="#e0e7ff"/>
  </g>

  <!-- Annotations -->
  <text x="230" y="890" class="label" text-anchor="middle">Collapsible filter sections</text>
  <text x="900" y="890" class="label" text-anchor="middle">Results with anime overlay labels -- click to view</text>
</svg>
