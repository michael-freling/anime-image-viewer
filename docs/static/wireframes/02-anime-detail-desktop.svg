<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
      .label { font-size: 11px; fill: #888; }
      .heading { font-size: 20px; fill: #111; font-weight: 600; }
      .subheading { font-size: 14px; fill: #111; font-weight: 500; }
      .body { font-size: 12px; fill: #555; }
      .small { font-size: 10px; fill: #999; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="#fafafa"/>

  <!-- ==================== TOP BAR ==================== -->
  <rect x="0" y="0" width="1440" height="56" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Back arrow + breadcrumb -->
  <text x="24" y="34" font-size="18" fill="#6366f1">&#8592;</text>
  <text x="48" y="34" class="body" fill="#888">Library</text>
  <text x="90" y="34" class="body" fill="#ccc">/</text>
  <text x="102" y="34" class="subheading">Attack on Titan</text>

  <!-- Global Search -->
  <rect x="460" y="12" width="520" height="32" rx="8" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="480" y="32" class="body" fill="#aaa">Search anime, images, tags... (Ctrl+K)</text>

  <!-- Right controls -->
  <circle cx="1360" cy="28" r="14" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
  <circle cx="1400" cy="28" r="14" fill="none" stroke="#d1d5db" stroke-width="1.5"/>

  <!-- ==================== SIDEBAR (64px collapsed) ==================== -->
  <rect x="0" y="56" width="64" height="844" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Active indicator on Library -->
  <rect x="8" y="68" width="48" height="44" rx="8" fill="#eef2ff"/>
  <text x="32" y="92" class="small" text-anchor="middle" fill="#6366f1">Library</text>

  <!-- ==================== LEFT PANEL: Entry Tree + Tags (320px) ==================== -->
  <rect x="64" y="56" width="320" height="844" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Anime Header in Panel -->
  <rect x="64" y="56" width="320" height="100" fill="#fff"/>
  <text x="84" y="88" class="heading" font-size="16">Attack on Titan</text>
  <text x="84" y="106" class="body">342 images across 4 seasons</text>

  <!-- Action buttons -->
  <rect x="84" y="120" width="64" height="24" rx="4" fill="#6366f1"/>
  <text x="116" y="136" font-size="10" fill="#fff" text-anchor="middle">Edit</text>
  <rect x="156" y="120" width="80" height="24" rx="4" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="196" y="136" font-size="10" fill="#555" text-anchor="middle">+ Entry</text>
  <rect x="244" y="120" width="28" height="24" rx="4" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="258" y="136" font-size="12" fill="#888" text-anchor="middle">...</text>

  <line x1="84" y1="152" x2="364" y2="152" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ENTRIES Section -->
  <text x="84" y="172" font-size="11" fill="#888" font-weight="500" letter-spacing="1">ENTRIES</text>

  <!-- Entry: All Images (selected) -->
  <rect x="76" y="180" width="300" height="36" rx="6" fill="#eef2ff"/>
  <text x="96" y="202" class="subheading" fill="#6366f1" font-size="13">All Images</text>
  <text x="348" y="202" class="small" text-anchor="end" fill="#6366f1">342</text>

  <!-- Entry: Season 1 -->
  <rect x="76" y="220" width="300" height="36" rx="6" fill="transparent"/>
  <text x="96" y="242" class="body">Season 1</text>
  <text x="348" y="242" class="small" text-anchor="end">86</text>

  <!-- Entry: Season 2 -->
  <rect x="76" y="256" width="300" height="36" rx="6" fill="transparent"/>
  <text x="96" y="278" class="body">Season 2</text>
  <text x="348" y="278" class="small" text-anchor="end">72</text>

  <!-- Entry: Season 3 (expanded with sub-entries) -->
  <rect x="76" y="292" width="300" height="36" rx="6" fill="transparent"/>
  <text x="88" y="314" class="body">&#9660;</text>
  <text x="104" y="314" class="body">Season 3</text>
  <text x="348" y="314" class="small" text-anchor="end">98</text>

  <!-- Sub-entries indented -->
  <rect x="100" y="328" width="276" height="28" rx="4" fill="transparent"/>
  <text x="120" y="346" class="small" fill="#555">Part 1</text>
  <text x="348" y="346" class="small" text-anchor="end">54</text>

  <rect x="100" y="356" width="276" height="28" rx="4" fill="transparent"/>
  <text x="120" y="374" class="small" fill="#555">Part 2</text>
  <text x="348" y="374" class="small" text-anchor="end">44</text>

  <!-- Entry: Season 4 -->
  <rect x="76" y="388" width="300" height="36" rx="6" fill="transparent"/>
  <text x="96" y="410" class="body">Season 4 (The Final Season)</text>
  <text x="348" y="410" class="small" text-anchor="end">86</text>

  <line x1="84" y1="436" x2="364" y2="436" stroke="#e5e7eb" stroke-width="1"/>

  <!-- CHARACTERS Section -->
  <text x="84" y="456" font-size="11" fill="#888" font-weight="500" letter-spacing="1">CHARACTERS</text>
  <rect x="338" y="442" width="24" height="20" rx="4" fill="#f3f4f6"/>
  <text x="350" y="456" font-size="12" fill="#888" text-anchor="middle">+</text>

  <!-- Character chips -->
  <rect x="84" y="466" width="60" height="24" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="114" y="482" font-size="10" fill="#555" text-anchor="middle">Eren</text>
  <rect x="152" y="466" width="64" height="24" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="184" y="482" font-size="10" fill="#555" text-anchor="middle">Mikasa</text>
  <rect x="224" y="466" width="56" height="24" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="252" y="482" font-size="10" fill="#555" text-anchor="middle">Armin</text>
  <rect x="288" y="466" width="48" height="24" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="312" y="482" font-size="10" fill="#555" text-anchor="middle">Levi</text>

  <rect x="84" y="496" width="64" height="24" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="116" y="512" font-size="10" fill="#555" text-anchor="middle">Historia</text>
  <rect x="156" y="496" width="56" height="24" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="184" y="512" font-size="10" fill="#555" text-anchor="middle">Hange</text>

  <line x1="84" y1="532" x2="364" y2="532" stroke="#e5e7eb" stroke-width="1"/>

  <!-- TAGS Section -->
  <text x="84" y="552" font-size="11" fill="#888" font-weight="500" letter-spacing="1">TAGS</text>
  <rect x="338" y="538" width="24" height="20" rx="4" fill="#f3f4f6"/>
  <text x="350" y="552" font-size="12" fill="#888" text-anchor="middle">+</text>

  <rect x="84" y="562" width="56" height="24" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="112" y="578" font-size="10" fill="#16a34a" text-anchor="middle">Action</text>
  <rect x="148" y="562" width="60" height="24" rx="12" fill="#fefce8" stroke="#fef08a" stroke-width="1"/>
  <text x="178" y="578" font-size="10" fill="#ca8a04" text-anchor="middle">Fantasy</text>
  <rect x="216" y="562" width="52" height="24" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="242" y="578" font-size="10" fill="#dc2626" text-anchor="middle">Drama</text>

  <line x1="84" y1="600" x2="364" y2="600" stroke="#e5e7eb" stroke-width="1"/>

  <!-- FOLDERS Section -->
  <text x="84" y="620" font-size="11" fill="#888" font-weight="500" letter-spacing="1">FOLDERS</text>

  <rect x="84" y="630" width="280" height="28" rx="4" fill="transparent"/>
  <text x="100" y="648" class="body" fill="#6366f1">&#128193;</text>
  <text x="120" y="648" class="small" fill="#555">attack-on-titan/</text>

  <rect x="104" y="658" width="260" height="24" rx="4" fill="transparent"/>
  <text x="120" y="674" class="small" fill="#555">&#128193; season-1/</text>

  <rect x="104" y="682" width="260" height="24" rx="4" fill="transparent"/>
  <text x="120" y="698" class="small" fill="#555">&#128193; season-2/</text>

  <!-- ==================== MAIN CONTENT: Image Grid ==================== -->
  <rect x="384" y="56" width="1056" height="844" fill="#fafafa"/>

  <!-- Toolbar -->
  <rect x="384" y="56" width="1056" height="48" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="404" y="84" class="body" fill="#555">342 images</text>

  <!-- View/Edit mode toggle -->
  <rect x="500" y="68" width="56" height="26" rx="4" fill="#6366f1"/>
  <text x="528" y="85" font-size="10" fill="#fff" text-anchor="middle">View</text>
  <rect x="556" y="68" width="56" height="26" rx="4" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="584" y="85" font-size="10" fill="#555" text-anchor="middle">Select</text>

  <!-- Filter by tag -->
  <rect x="640" y="68" width="120" height="26" rx="4" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="660" y="85" font-size="10" fill="#888">Filter by tag...</text>

  <!-- Sort -->
  <rect x="770" y="68" width="80" height="26" rx="4" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="790" y="85" font-size="10" fill="#555">Date added</text>

  <!-- Upload button -->
  <rect x="1320" y="68" width="100" height="26" rx="4" fill="#fff" stroke="#6366f1" stroke-width="1"/>
  <text x="1370" y="85" font-size="10" fill="#6366f1" text-anchor="middle">Upload</text>

  <!-- ==================== IMAGE GRID (masonry-style) ==================== -->
  <!-- Row 1 -->
  <g transform="translate(404, 118)">
    <rect width="240" height="160" rx="8" fill="#e0e7ff"/>
    <text x="120" y="84" class="small" fill="#a5b4fc" text-anchor="middle">Image 1</text>
  </g>
  <g transform="translate(656, 118)">
    <rect width="240" height="160" rx="8" fill="#fce7f3"/>
    <text x="120" y="84" class="small" fill="#f9a8d4" text-anchor="middle">Image 2</text>
  </g>
  <g transform="translate(908, 118)">
    <rect width="240" height="160" rx="8" fill="#d1fae5"/>
    <text x="120" y="84" class="small" fill="#6ee7b7" text-anchor="middle">Image 3</text>
  </g>
  <g transform="translate(1160, 118)">
    <rect width="240" height="160" rx="8" fill="#fef3c7"/>
    <text x="120" y="84" class="small" fill="#fcd34d" text-anchor="middle">Image 4</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(404, 290)">
    <rect width="240" height="160" rx="8" fill="#ddd6fe"/>
    <text x="120" y="84" class="small" fill="#c4b5fd" text-anchor="middle">Image 5</text>
  </g>
  <g transform="translate(656, 290)">
    <rect width="240" height="160" rx="8" fill="#fbcfe8"/>
    <text x="120" y="84" class="small" fill="#f9a8d4" text-anchor="middle">Image 6</text>
  </g>
  <g transform="translate(908, 290)">
    <rect width="240" height="160" rx="8" fill="#ccfbf1"/>
    <text x="120" y="84" class="small" fill="#5eead4" text-anchor="middle">Image 7</text>
  </g>
  <g transform="translate(1160, 290)">
    <rect width="240" height="160" rx="8" fill="#fee2e2"/>
    <text x="120" y="84" class="small" fill="#fca5a5" text-anchor="middle">Image 8</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(404, 462)">
    <rect width="240" height="160" rx="8" fill="#e0e7ff"/>
    <text x="120" y="84" class="small" fill="#a5b4fc" text-anchor="middle">Image 9</text>
  </g>
  <g transform="translate(656, 462)">
    <rect width="240" height="160" rx="8" fill="#fef3c7"/>
    <text x="120" y="84" class="small" fill="#fcd34d" text-anchor="middle">Image 10</text>
  </g>
  <g transform="translate(908, 462)">
    <rect width="240" height="160" rx="8" fill="#d1fae5"/>
    <text x="120" y="84" class="small" fill="#6ee7b7" text-anchor="middle">Image 11</text>
  </g>
  <g transform="translate(1160, 462)">
    <rect width="240" height="160" rx="8" fill="#ddd6fe"/>
    <text x="120" y="84" class="small" fill="#c4b5fd" text-anchor="middle">Image 12</text>
  </g>

  <!-- Row 4 (partial) -->
  <g transform="translate(404, 634)">
    <rect width="240" height="160" rx="8" fill="#fce7f3"/>
    <text x="120" y="84" class="small" fill="#f9a8d4" text-anchor="middle">Image 13</text>
  </g>
  <g transform="translate(656, 634)">
    <rect width="240" height="160" rx="8" fill="#e0e7ff"/>
    <text x="120" y="84" class="small" fill="#a5b4fc" text-anchor="middle">Image 14</text>
  </g>
  <g transform="translate(908, 634)">
    <rect width="240" height="160" rx="8" fill="#ccfbf1"/>
    <text x="120" y="84" class="small" fill="#5eead4" text-anchor="middle">Image 15</text>
  </g>
  <g transform="translate(1160, 634)">
    <rect width="240" height="160" rx="8" fill="#fee2e2"/>
    <text x="120" y="84" class="small" fill="#fca5a5" text-anchor="middle">Image 16</text>
  </g>

  <!-- Annotations -->
  <text x="204" y="890" class="label" text-anchor="middle">Entry tree + metadata panel</text>
  <text x="912" y="890" class="label" text-anchor="middle">Virtualized image grid -- click to fullscreen view</text>
</svg>
