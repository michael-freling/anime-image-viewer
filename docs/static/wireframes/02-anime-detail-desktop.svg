<svg viewBox="0 0 3840 2160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
      .label { font-size: 22px; fill: #888; }
      .heading { font-size: 44px; fill: #f1f5f9; font-weight: 700; }
      .subheading { font-size: 28px; fill: #f1f5f9; font-weight: 500; }
      .body { font-size: 24px; fill: #94a3b8; }
      .small { font-size: 20px; fill: #64748b; }
    </style>
    <linearGradient id="heroFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f14" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0f0f14" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0f0f14"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="3840" height="2160" fill="#0f0f14"/>

  <!-- Icon rail (80px, same as home) -->
  <rect x="0" y="0" width="80" height="2160" fill="#16161e"/>
  <!-- Home (active indicator) -->
  <rect x="16" y="20" width="48" height="48" rx="12" fill="#818cf8"/>
  <text x="40" y="52" font-size="28" fill="#fff" font-weight="700" text-anchor="middle">A</text>
  <g transform="translate(0, 100)">
    <rect x="8" y="0" width="64" height="64" rx="12" fill="#1e1e2e"/>
    <text x="40" y="84" font-size="18" fill="#818cf8" text-anchor="middle" font-weight="500">Home</text>
  </g>

  <!-- ==================== HERO HEADER (full-width banner) ==================== -->
  <!-- Blurred background cover image area -->
  <rect x="80" y="0" width="3760" height="400" fill="#1e1040"/>
  <!-- Gradient fade to background -->
  <rect x="80" y="200" width="3760" height="200" fill="url(#heroFade)"/>

  <!-- Back navigation -->
  <text x="140" y="60" font-size="32" fill="#f1f5f9" font-weight="500">Home</text>
  <text x="230" y="60" font-size="32" fill="#475569">/</text>

  <!-- Anime title + metadata (overlaying hero) -->
  <text x="140" y="180" font-size="56" fill="#f1f5f9" font-weight="700">Attack on Titan</text>
  <text x="140" y="230" class="body">4 entries -- 342 images -- Action, Fantasy, Drama</text>

  <!-- Action buttons (inline with hero) -->
  <rect x="140" y="260" width="160" height="48" rx="12" fill="#818cf8"/>
  <text x="220" y="291" font-size="22" fill="#fff" text-anchor="middle" font-weight="500">+ Entry</text>

  <rect x="320" y="260" width="160" height="48" rx="12" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1.5"/>
  <text x="400" y="291" font-size="22" fill="#94a3b8" text-anchor="middle">Upload</text>

  <rect x="500" y="260" width="120" height="48" rx="12" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1.5"/>
  <text x="560" y="291" font-size="22" fill="#94a3b8" text-anchor="middle">Edit</text>

  <rect x="640" y="260" width="56" height="48" rx="12" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1.5"/>
  <text x="668" y="291" font-size="22" fill="#94a3b8" text-anchor="middle">...</text>

  <!-- ==================== ENTRY TABS (horizontal chips) ==================== -->
  <rect x="80" y="400" width="3760" height="80" fill="#0f0f14"/>

  <!-- Entry chip tabs -->
  <rect x="140" y="416" width="160" height="48" rx="24" fill="#818cf8"/>
  <text x="220" y="447" font-size="22" fill="#fff" text-anchor="middle" font-weight="500">All Images</text>
  <text x="300" y="447" font-size="18" fill="rgba(255,255,255,0.7)"/>

  <rect x="320" y="416" width="160" height="48" rx="24" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1.5"/>
  <text x="400" y="447" font-size="22" fill="#94a3b8" text-anchor="middle">Season 1</text>

  <rect x="500" y="416" width="160" height="48" rx="24" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1.5"/>
  <text x="580" y="447" font-size="22" fill="#94a3b8" text-anchor="middle">Season 2</text>

  <rect x="680" y="416" width="220" height="48" rx="24" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1.5"/>
  <text x="790" y="447" font-size="22" fill="#94a3b8" text-anchor="middle">Season 3</text>

  <rect x="920" y="416" width="320" height="48" rx="24" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1.5"/>
  <text x="1080" y="447" font-size="22" fill="#94a3b8" text-anchor="middle">Season 4 (Final)</text>

  <!-- Sub-entry indicators (collapsed) -->
  <text x="1260" y="447" font-size="18" fill="#475569">Season 3 has 2 parts</text>

  <!-- Toolbar row (filter by tag, sort, view mode) -->
  <rect x="80" y="480" width="3760" height="60" fill="#0f0f14"/>

  <text x="140" y="520" class="body" fill="#64748b">342 images</text>

  <!-- Tag filter chips inline -->
  <rect x="380" y="494" width="140" height="36" rx="18" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
  <text x="420" y="518" font-size="20" fill="#64748b">Tag filter +</text>

  <!-- Sort -->
  <rect x="540" y="494" width="180" height="36" rx="18" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
  <text x="570" y="518" font-size="20" fill="#64748b">Sort: Date added</text>

  <!-- View/Select mode toggle -->
  <rect x="3460" y="494" width="100" height="36" rx="8" fill="#818cf8"/>
  <text x="3510" y="518" font-size="20" fill="#fff" text-anchor="middle">View</text>
  <rect x="3560" y="494" width="100" height="36" rx="8" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
  <text x="3610" y="518" font-size="20" fill="#64748b" text-anchor="middle">Select</text>

  <!-- ==================== MASONRY IMAGE GRID (full width, 7 columns at 4K) ==================== -->
  <!-- Row 1 -->
  <g transform="translate(140, 560)">
    <rect width="480" height="320" rx="12" fill="#312e81"/>
    <text x="240" y="168" font-size="24" fill="#818cf8" text-anchor="middle">Image 1</text>
  </g>
  <g transform="translate(640, 560)">
    <rect width="480" height="400" rx="12" fill="#831843"/>
    <text x="240" y="208" font-size="24" fill="#f9a8d4" text-anchor="middle">Image 2</text>
  </g>
  <g transform="translate(1140, 560)">
    <rect width="480" height="280" rx="12" fill="#14532d"/>
    <text x="240" y="148" font-size="24" fill="#6ee7b7" text-anchor="middle">Image 3</text>
  </g>
  <g transform="translate(1640, 560)">
    <rect width="480" height="360" rx="12" fill="#713f12"/>
    <text x="240" y="188" font-size="24" fill="#fcd34d" text-anchor="middle">Image 4</text>
  </g>
  <g transform="translate(2140, 560)">
    <rect width="480" height="320" rx="12" fill="#3b0764"/>
    <text x="240" y="168" font-size="24" fill="#c4b5fd" text-anchor="middle">Image 5</text>
  </g>
  <g transform="translate(2640, 560)">
    <rect width="480" height="380" rx="12" fill="#1c1917"/>
    <text x="240" y="198" font-size="24" fill="#a8a29e" text-anchor="middle">Image 6</text>
  </g>
  <g transform="translate(3140, 560)">
    <rect width="480" height="300" rx="12" fill="#881337"/>
    <text x="240" y="158" font-size="24" fill="#fb7185" text-anchor="middle">Image 7</text>
  </g>

  <!-- Row 2 (masonry -- different heights, staggered) -->
  <g transform="translate(140, 900)">
    <rect width="480" height="360" rx="12" fill="#134e4a"/>
    <text x="240" y="188" font-size="24" fill="#5eead4" text-anchor="middle">Image 8</text>
  </g>
  <g transform="translate(640, 980)">
    <rect width="480" height="320" rx="12" fill="#7f1d1d"/>
    <text x="240" y="168" font-size="24" fill="#fca5a5" text-anchor="middle">Image 9</text>
  </g>
  <g transform="translate(1140, 860)">
    <rect width="480" height="400" rx="12" fill="#1e3a5f"/>
    <text x="240" y="208" font-size="24" fill="#7dd3fc" text-anchor="middle">Image 10</text>
  </g>
  <g transform="translate(1640, 940)">
    <rect width="480" height="280" rx="12" fill="#4a1d96"/>
    <text x="240" y="148" font-size="24" fill="#a78bfa" text-anchor="middle">Image 11</text>
  </g>
  <g transform="translate(2140, 900)">
    <rect width="480" height="360" rx="12" fill="#365314"/>
    <text x="240" y="188" font-size="24" fill="#a3e635" text-anchor="middle">Image 12</text>
  </g>
  <g transform="translate(2640, 960)">
    <rect width="480" height="300" rx="12" fill="#312e81"/>
    <text x="240" y="158" font-size="24" fill="#818cf8" text-anchor="middle">Image 13</text>
  </g>
  <g transform="translate(3140, 880)">
    <rect width="480" height="380" rx="12" fill="#831843"/>
    <text x="240" y="198" font-size="24" fill="#f9a8d4" text-anchor="middle">Image 14</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(140, 1280)">
    <rect width="480" height="320" rx="12" fill="#14532d"/>
    <text x="240" y="168" font-size="24" fill="#6ee7b7" text-anchor="middle">Image 15</text>
  </g>
  <g transform="translate(640, 1320)">
    <rect width="480" height="280" rx="12" fill="#713f12"/>
    <text x="240" y="148" font-size="24" fill="#fcd34d" text-anchor="middle">Image 16</text>
  </g>
  <g transform="translate(1140, 1280)">
    <rect width="480" height="320" rx="12" fill="#3b0764"/>
    <text x="240" y="168" font-size="24" fill="#c4b5fd" text-anchor="middle">Image 17</text>
  </g>

  <!-- Annotations -->
  <text x="1960" y="2100" class="label" text-anchor="middle">Hero header with anime info -- Entry chips (no folders) -- Full-width masonry grid</text>
  <text x="1960" y="2140" class="label" text-anchor="middle">Inspired by AniList profile + Pinterest boards -- NO sidebar panels</text>
</svg>
