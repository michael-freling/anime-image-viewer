<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
      .label { font-size: 11px; fill: #888; }
      .heading { font-size: 18px; fill: #111; font-weight: 600; }
      .subheading { font-size: 14px; fill: #111; font-weight: 500; }
      .body { font-size: 12px; fill: #555; }
      .small { font-size: 10px; fill: #999; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="#fafafa"/>

  <!-- ==================== TOP BAR ==================== -->
  <rect x="0" y="0" width="1440" height="56" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="24" y="14" width="28" height="28" rx="6" fill="#6366f1"/>
  <text x="40" y="33" font-size="14" fill="#fff" font-weight="700" text-anchor="middle">A</text>
  <text x="64" y="34" font-size="15" fill="#111" font-weight="600">AnimeVault</text>
  <rect x="460" y="12" width="520" height="32" rx="8" fill="#f3f4f6"/>
  <text x="480" y="32" class="body" fill="#aaa">Search anime, images, tags...</text>

  <!-- ==================== SIDEBAR ==================== -->
  <rect x="0" y="56" width="64" height="844" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="8" y="180" width="48" height="44" rx="8" fill="#eef2ff"/>
  <text x="32" y="212" class="small" text-anchor="middle" fill="#6366f1">Folders</text>

  <!-- ==================== FOLDER TREE PANEL ==================== -->
  <rect x="64" y="56" width="380" height="844" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>

  <text x="84" y="88" class="heading" font-size="16">Folders</text>
  <text x="84" y="106" class="body">12 folders -- 1,847 images</text>

  <!-- Mode toggle -->
  <rect x="84" y="118" width="64" height="26" rx="4" fill="#6366f1"/>
  <text x="116" y="135" font-size="10" fill="#fff" text-anchor="middle">Browse</text>
  <rect x="148" y="118" width="80" height="26" rx="4" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="188" y="135" font-size="10" fill="#555" text-anchor="middle">Edit Tags</text>

  <!-- New Folder button -->
  <rect x="340" y="118" width="84" height="26" rx="4" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="382" y="135" font-size="10" fill="#555" text-anchor="middle">+ Folder</text>

  <line x1="84" y1="154" x2="424" y2="154" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Folder tree -->
  <!-- Root -->
  <rect x="84" y="162" width="340" height="32" rx="4" fill="#f8fafc"/>
  <text x="100" y="182" font-size="12" fill="#6366f1" font-weight="500">&#128193; anime-images/</text>

  <!-- Level 1 folders -->
  <g transform="translate(108, 198)">
    <text x="0" y="14" class="body">&#9662; &#128193; attack-on-titan/</text>
    <text x="300" y="14" class="small" text-anchor="end">342</text>
  </g>

  <!-- Level 2 (indented) -->
  <g transform="translate(132, 220)">
    <text x="0" y="14" class="body" fill="#888">&#128193; season-1/</text>
    <text x="276" y="14" class="small" text-anchor="end">86</text>
  </g>
  <!-- Selected folder -->
  <rect x="124" y="236" width="300" height="24" rx="4" fill="#eef2ff"/>
  <g transform="translate(132, 238)">
    <text x="0" y="14" class="body" fill="#6366f1">&#128193; season-2/</text>
    <text x="276" y="14" class="small" text-anchor="end" fill="#6366f1">72</text>
  </g>
  <g transform="translate(132, 262)">
    <text x="0" y="14" class="body" fill="#888">&#128193; season-3/</text>
    <text x="276" y="14" class="small" text-anchor="end">98</text>
  </g>
  <g transform="translate(132, 284)">
    <text x="0" y="14" class="body" fill="#888">&#128193; season-4/</text>
    <text x="276" y="14" class="small" text-anchor="end">86</text>
  </g>

  <!-- More Level 1 folders -->
  <g transform="translate(108, 312)">
    <text x="0" y="14" class="body">&#9656; &#128193; spy-x-family/</text>
    <text x="300" y="14" class="small" text-anchor="end">218</text>
  </g>
  <g transform="translate(108, 336)">
    <text x="0" y="14" class="body">&#9656; &#128193; jujutsu-kaisen/</text>
    <text x="300" y="14" class="small" text-anchor="end">187</text>
  </g>
  <g transform="translate(108, 360)">
    <text x="0" y="14" class="body">&#9656; &#128193; demon-slayer/</text>
    <text x="300" y="14" class="small" text-anchor="end">276</text>
  </g>
  <g transform="translate(108, 384)">
    <text x="0" y="14" class="body">&#9656; &#128193; frieren/</text>
    <text x="300" y="14" class="small" text-anchor="end">156</text>
  </g>
  <g transform="translate(108, 408)">
    <text x="0" y="14" class="body">&#9656; &#128193; chainsaw-man/</text>
    <text x="300" y="14" class="small" text-anchor="end">94</text>
  </g>

  <!-- Folder info bar (for selected folder) -->
  <rect x="84" y="450" width="340" height="1" fill="#e5e7eb"/>
  <rect x="84" y="458" width="340" height="100" rx="8" fill="#f8fafc"/>
  <text x="100" y="482" font-size="11" fill="#888" font-weight="500">SELECTED FOLDER</text>
  <text x="100" y="502" class="subheading" font-size="12">season-2/</text>
  <text x="100" y="518" class="small">72 images -- Anime: Attack on Titan</text>

  <!-- Folder actions -->
  <rect x="100" y="530" width="56" height="22" rx="4" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="128" y="544" font-size="9" fill="#555" text-anchor="middle">Rename</text>
  <rect x="164" y="530" width="68" height="22" rx="4" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="198" y="544" font-size="9" fill="#555" text-anchor="middle">Edit Tags</text>
  <rect x="240" y="530" width="72" height="22" rx="4" fill="#fff" stroke="#6366f1" stroke-width="1"/>
  <text x="276" y="544" font-size="9" fill="#6366f1" text-anchor="middle">Import</text>

  <!-- Tags on folder -->
  <text x="100" y="572" class="small" fill="#888">Tags:</text>
  <rect x="132" y="560" width="52" height="20" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="158" y="574" font-size="9" fill="#16a34a" text-anchor="middle">Action</text>
  <rect x="190" y="560" width="64" height="20" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="222" y="574" font-size="9" fill="#6366f1" text-anchor="middle">Outdoor</text>

  <!-- ==================== MAIN: IMAGE GRID for selected folder ==================== -->
  <rect x="444" y="56" width="996" height="844" fill="#fafafa"/>

  <!-- Breadcrumb -->
  <rect x="444" y="56" width="996" height="44" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="464" y="82" class="body" fill="#888">anime-images / attack-on-titan / </text>
  <text x="644" y="82" class="body" fill="#111" font-weight="500">season-2</text>
  <text x="710" y="82" class="small">72 images</text>

  <!-- View/Select mode -->
  <rect x="840" y="68" width="56" height="26" rx="4" fill="#6366f1"/>
  <text x="868" y="85" font-size="10" fill="#fff" text-anchor="middle">View</text>
  <rect x="896" y="68" width="56" height="26" rx="4" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="924" y="85" font-size="10" fill="#555" text-anchor="middle">Select</text>

  <!-- Image grid -->
  <g transform="translate(464, 112)">
    <rect width="220" height="150" rx="8" fill="#e0e7ff"/>
  </g>
  <g transform="translate(696, 112)">
    <rect width="220" height="150" rx="8" fill="#fce7f3"/>
  </g>
  <g transform="translate(928, 112)">
    <rect width="220" height="150" rx="8" fill="#d1fae5"/>
  </g>
  <g transform="translate(1160, 112)">
    <rect width="220" height="150" rx="8" fill="#fef3c7"/>
  </g>

  <g transform="translate(464, 274)">
    <rect width="220" height="150" rx="8" fill="#ddd6fe"/>
  </g>
  <g transform="translate(696, 274)">
    <rect width="220" height="150" rx="8" fill="#fbcfe8"/>
  </g>
  <g transform="translate(928, 274)">
    <rect width="220" height="150" rx="8" fill="#ccfbf1"/>
  </g>
  <g transform="translate(1160, 274)">
    <rect width="220" height="150" rx="8" fill="#fee2e2"/>
  </g>

  <g transform="translate(464, 436)">
    <rect width="220" height="150" rx="8" fill="#e0e7ff"/>
  </g>
  <g transform="translate(696, 436)">
    <rect width="220" height="150" rx="8" fill="#fef3c7"/>
  </g>
  <g transform="translate(928, 436)">
    <rect width="220" height="150" rx="8" fill="#d1fae5"/>
  </g>
  <g transform="translate(1160, 436)">
    <rect width="220" height="150" rx="8" fill="#ddd6fe"/>
  </g>

  <g transform="translate(464, 598)">
    <rect width="220" height="150" rx="8" fill="#fce7f3"/>
  </g>
  <g transform="translate(696, 598)">
    <rect width="220" height="150" rx="8" fill="#ccfbf1"/>
  </g>
  <g transform="translate(928, 598)">
    <rect width="220" height="150" rx="8" fill="#fee2e2"/>
  </g>
  <g transform="translate(1160, 598)">
    <rect width="220" height="150" rx="8" fill="#e0e7ff"/>
  </g>

  <!-- Annotation -->
  <text x="264" y="890" class="label" text-anchor="middle">Folder tree with info panel -- double-click to rename</text>
  <text x="920" y="890" class="label" text-anchor="middle">Images from selected folder</text>
</svg>
