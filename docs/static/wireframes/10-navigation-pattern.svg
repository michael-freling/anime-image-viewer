<svg viewBox="0 0 1440 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
      .label { font-size: 11px; fill: #555; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1440" height="600" fill="#0f0f14"/>

  <!-- Title -->
  <text x="720" y="32" font-size="18" fill="#f1f5f9" font-weight="700" text-anchor="middle">Navigation Pattern: Desktop Icon Rail + Mobile Bottom Bar</text>

  <!-- ==================== DESKTOP ICON RAIL (collapsed, 64px) ==================== -->
  <text x="200" y="64" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="600">Desktop: 64px Icon Rail</text>

  <rect x="120" y="80" width="64" height="440" fill="#16161e" stroke="#2d2d3f" stroke-width="1"/>

  <!-- App logo -->
  <rect x="132" y="94" width="40" height="40" rx="10" fill="#818cf8"/>
  <text x="152" y="120" font-size="20" fill="#fff" font-weight="700" text-anchor="middle">A</text>

  <!-- Home (active) -->
  <g transform="translate(120, 150)">
    <rect x="6" y="0" width="52" height="52" rx="10" fill="#1e1e2e"/>
    <rect x="20" y="10" width="24" height="18" rx="3" fill="none" stroke="#818cf8" stroke-width="2"/>
    <text x="32" y="68" font-size="11" fill="#818cf8" text-anchor="middle" font-weight="500">Home</text>
  </g>

  <!-- Search -->
  <g transform="translate(120, 234)">
    <rect x="6" y="0" width="52" height="52" rx="10" fill="transparent"/>
    <circle cx="29" cy="23" r="9" fill="none" stroke="#64748b" stroke-width="2"/>
    <line x1="35" y1="29" x2="43" y2="37" stroke="#64748b" stroke-width="2"/>
    <text x="32" y="68" font-size="11" fill="#64748b" text-anchor="middle">Search</text>
  </g>

  <!-- Tags -->
  <g transform="translate(120, 318)">
    <rect x="6" y="0" width="52" height="52" rx="10" fill="transparent"/>
    <rect x="18" y="12" width="22" height="16" rx="5" fill="none" stroke="#64748b" stroke-width="2" transform="rotate(-8, 29, 20)"/>
    <text x="32" y="68" font-size="11" fill="#64748b" text-anchor="middle">Tags</text>
  </g>

  <!-- Divider -->
  <line x1="136" y1="406" x2="168" y2="406" stroke="#2d2d3f" stroke-width="1"/>

  <!-- Settings -->
  <g transform="translate(120, 420)">
    <rect x="6" y="0" width="52" height="52" rx="10" fill="transparent"/>
    <circle cx="32" cy="23" r="11" fill="none" stroke="#64748b" stroke-width="2"/>
    <circle cx="32" cy="23" r="4" fill="#64748b"/>
    <text x="32" y="68" font-size="11" fill="#64748b" text-anchor="middle">Settings</text>
  </g>

  <!-- Description -->
  <text x="200" y="540" font-size="11" fill="#64748b" text-anchor="middle">Primary: Home, Search, Tags</text>
  <text x="200" y="556" font-size="11" fill="#64748b" text-anchor="middle">Settings below divider</text>

  <!-- ==================== DESKTOP EXPANDED (middle) ==================== -->
  <text x="500" y="64" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="600">Desktop: Expanded on Hover (180px)</text>

  <rect x="360" y="80" width="180" height="440" fill="#16161e" stroke="#2d2d3f" stroke-width="1"/>

  <!-- App logo + name -->
  <rect x="372" y="94" width="40" height="40" rx="10" fill="#818cf8"/>
  <text x="392" y="120" font-size="20" fill="#fff" font-weight="700" text-anchor="middle">A</text>
  <text x="420" y="120" font-size="14" fill="#f1f5f9" font-weight="600">AnimeVault</text>

  <!-- Nav with labels -->
  <g transform="translate(360, 150)">
    <rect x="6" y="0" width="168" height="36" rx="8" fill="#1e1e2e"/>
    <rect x="18" y="8" width="20" height="14" rx="3" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <text x="50" y="24" font-size="13" fill="#818cf8" font-weight="500">Home</text>
  </g>

  <g transform="translate(360, 196)">
    <rect x="6" y="0" width="168" height="36" rx="8" fill="transparent"/>
    <circle cx="28" cy="16" r="8" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <text x="50" y="22" font-size="13" fill="#64748b">Search</text>
  </g>

  <g transform="translate(360, 242)">
    <rect x="6" y="0" width="168" height="36" rx="8" fill="transparent"/>
    <rect x="16" y="8" width="18" height="12" rx="3" fill="none" stroke="#64748b" stroke-width="1.5" transform="rotate(-8, 25, 14)"/>
    <text x="50" y="22" font-size="13" fill="#64748b">Tags</text>
  </g>

  <line x1="372" y1="290" x2="528" y2="290" stroke="#2d2d3f" stroke-width="1"/>

  <g transform="translate(360, 302)">
    <rect x="6" y="0" width="168" height="36" rx="8" fill="transparent"/>
    <text x="50" y="22" font-size="13" fill="#64748b">Settings</text>
  </g>

  <!-- Ctrl+K hint -->
  <rect x="368" y="476" width="160" height="28" rx="6" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
  <text x="448" y="495" font-size="11" fill="#64748b" text-anchor="middle">Ctrl+K Search</text>

  <!-- ==================== MOBILE BOTTOM BAR (4 items) ==================== -->
  <text x="850" y="64" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="600">Mobile: 4-Tab Bottom Bar</text>

  <!-- Phone frame -->
  <rect x="660" y="80" width="375" height="440" rx="20" fill="#0f0f14" stroke="#2d2d3f" stroke-width="2"/>

  <!-- Content area -->
  <text x="848" y="290" font-size="14" fill="#2d2d3f" text-anchor="middle">Page Content</text>

  <!-- Bottom tab bar -->
  <rect x="660" y="456" width="375" height="64" fill="#16161e" stroke="#2d2d3f" stroke-width="1"/>

  <!-- Home (active) -->
  <g transform="translate(678, 464)">
    <rect x="10" y="-2" width="52" height="28" rx="14" fill="#1e1e2e"/>
    <rect x="24" y="4" width="24" height="16" rx="3" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <text x="36" y="40" font-size="10" fill="#818cf8" text-anchor="middle" font-weight="500">Home</text>
  </g>

  <!-- Search -->
  <g transform="translate(768, 464)">
    <circle cx="36" cy="12" r="8" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <line x1="42" y1="18" x2="48" y2="24" stroke="#64748b" stroke-width="1.5"/>
    <text x="36" y="40" font-size="10" fill="#64748b" text-anchor="middle">Search</text>
  </g>

  <!-- Tags -->
  <g transform="translate(858, 464)">
    <rect x="20" y="4" width="24" height="16" rx="5" fill="none" stroke="#64748b" stroke-width="1.5" transform="rotate(-8, 32, 12)"/>
    <text x="36" y="40" font-size="10" fill="#64748b" text-anchor="middle">Tags</text>
  </g>

  <!-- Settings -->
  <g transform="translate(948, 464)">
    <circle cx="36" cy="12" r="10" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="36" cy="12" r="3.5" fill="#64748b"/>
    <text x="36" y="40" font-size="10" fill="#64748b" text-anchor="middle">Settings</text>
  </g>

  <!-- Annotations -->
  <text x="720" y="580" class="label" text-anchor="middle">Desktop: 64px icon rail (Home, Search, Tags | Settings) -- expands to 180px on hover</text>
  <text x="720" y="594" class="label" text-anchor="middle">Mobile: 4-tab bottom bar (Home, Search, Tags, Settings) -- No "More" menu, Backup is under Settings</text>
</svg>