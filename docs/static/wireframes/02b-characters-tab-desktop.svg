  <g transform="translate(472, 152)">
    <rect width="172" height="190" rx="10" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
    <circle cx="86" cy="64" r="40" fill="#1a1a26" stroke="#2d2d3f" stroke-width="1"/>
    <circle cx="86" cy="56" r="12" fill="#475569"/>
    <ellipse cx="86" cy="78" rx="18" ry="12" fill="#475569"/>
    <rect x="130" y="12" width="28" height="16" rx="4" fill="#312e81"/>
    <text x="144" y="24" font-size="8" fill="#818cf8" text-anchor="middle">AL</text>
