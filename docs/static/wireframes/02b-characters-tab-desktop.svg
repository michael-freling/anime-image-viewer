    <text x="144" y="24" font-size="8" fill="#818cf8" text-anchor="middle">AL</text>
    <text x="86" y="126" font-size="12" fill="#f1f5f9" text-anchor="middle" font-weight="500">Erwin Smith</text>
    <text x="86" y="144" font-size="10" fill="#64748b" text-anchor="middle">Supporting</text>
    <text x="86" y="172" font-size="10" fill="#475569" text-anchor="middle">38 images</text>
  </g>

  <!-- Row 2 -->
  <!-- Card 8: Annie Leonhart -->
  <g transform="translate(100, 356)">
    <rect width="172" height="190" rx="10" fill="#1e1e2e" stroke="#2d2d3f" stroke-width="1"/>
    <circle cx="86" cy="64" r="40" fill="#1a1a26" stroke="#2d2d3f" stroke-width="1"/>
    <circle cx="86" cy="56" r="12" fill="#475569"/>
    <ellipse cx="86" cy="78" rx="18" ry="12" fill="#475569"/>
    <rect x="130" y="12" width="28" height="16" rx="4" fill="#312e81"/>
    <text x="144" y="24" font-size="8" fill="#818cf8" text-anchor="middle">AL</text>
    <text x="86" y="126" font-size="12" fill="#f1f5f9" text-anchor="middle" font-weight="500">Annie Leonhart</text>
    <text x="86" y="144" font-size="10" fill="#64748b" text-anchor="middle">Supporting</text>
    <text x="86" y="172" font-size="10" fill="#475569" text-anchor="middle">31 images</text>
  </g>

  <!-- Card 9: + Add Character -->
  <g transform="translate(286, 356)">
    <rect width="172" height="190" rx="10" fill="#1a1a26" stroke="#2d2d3f" stroke-width="1" stroke-dasharray="4,4"/>
    <!-- Plus icon -->
    <line x1="86" y1="70" x2="86" y2="100" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
    <line x1="71" y1="85" x2="101" y2="85" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
    <text x="86" y="130" font-size="12" fill="#64748b" text-anchor="middle">Add Character</text>
  </g>

  <!-- ==================== FOOTER ==================== -->
  <rect x="84" y="568" width="1336" height="32" fill="#0f0f14"/>
  <text x="100" y="589" font-size="11" fill="#64748b">8 characters · 692 tagged images</text>

  <!-- Annotation -->
  <text x="752" y="893" class="label" text-anchor="middle">Characters tab -- Full-page grid: character cards with AniList badges, image placeholders, role labels, add card at end</text>
</svg>