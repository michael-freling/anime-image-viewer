name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["main"]

# Only one review per PR at a time; cancel superseded runs.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip drafts and bot-authored PRs.
    if: >-
      github.event.pull_request.draft == false &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review PR with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # OAuth token is provisioned via the update-ci-secrets tool
          # (github.com/michael-freling/claude-code-tools).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Install Anthropic's official code-review plugin and run its skill.
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
